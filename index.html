<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="bank.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-title" content="支払管理">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毎月の支払い管理</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          user-select: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-24">
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'mpm_vanilla_v8_'; 

        const escapeHTML = (str) => {
            return String(str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        };

        const CAT_LABELS = {
            'loan': { label: 'ローン', icon: 'home', color: 'text-purple-600', bg: 'bg-purple-400', border: 'border-purple-200' },
            'fixed': { label: '固定費', icon: 'receipt_long', color: 'text-indigo-600', bg: 'bg-indigo-400', border: 'border-indigo-200' },
            'variable': { label: '変動費', icon: 'credit_card', color: 'text-rose-600', bg: 'bg-rose-400', border: 'border-rose-200' },
            'investment': { label: '投資', icon: 'trending_up', color: 'text-emerald-600', bg: 'bg-emerald-400', border: 'border-emerald-200' }
        };
        const SAFE_CAT = { label: '未分類', icon: 'payments', color: 'text-gray-600', bg: 'bg-gray-400', border: 'border-gray-200' };

        const ITEM_COLORS = [
            'bg-red-400', 'bg-orange-400', 'bg-amber-400', 'bg-yellow-400', 'bg-lime-400',
            'bg-green-400', 'bg-emerald-400', 'bg-teal-400', 'bg-cyan-400', 'bg-sky-400',
            'bg-blue-400', 'bg-indigo-400', 'bg-violet-400', 'bg-purple-400', 'bg-fuchsia-400',
            'bg-pink-400', 'bg-rose-400'
        ];

        const ICON_MAP = {
            'wallet': 'account_balance_wallet', 'arrow-down-to-line': 'vertical_align_bottom',
            'arrow-up-from-line': 'vertical_align_top', 'alert-circle': 'error_outline',
            'check-circle-2': 'check_circle', 'calculator': 'calculate', 'calendar': 'calendar_today',
            'chevron-down': 'expand_more', 'chevron-up': 'expand_less', 'bar-chart-3': 'bar_chart',
            'layout-dashboard': 'dashboard', 'save': 'save', 'info': 'info', 'building-2': 'account_balance',
            'alert-triangle': 'warning', 'x': 'close', 'settings': 'settings', 'copy': 'content_copy',
            'download': 'download', 'upload': 'upload', 'file-text': 'description', 'check': 'check',
            'plus': 'add', 'trash-2': 'delete', 'pencil': 'edit', 'message-square': 'chat_bubble_outline',
            'done': 'done_all', 'undo': 'undo', 'refresh': 'refresh', 'payments': 'payments',
            'home': 'home', 'receipt_long': 'receipt_long', 'credit_card': 'credit_card', 'trending_up': 'trending_up',
            'error_outline': 'error_outline', 'savings': 'savings', 'event_note': 'event_note'
        };

        const App = {
            state: {
                activeTab: 'dashboard', dashTab: 'accounts',
                chartMode: 'all',
                accounts: [], wallets: [], incomes: [], payments: [], history: [], 
                specialPayments: [], memos: [], // ★新機能のデータ
                expandedPayIds: new Set(), editMode: null, deleteTarget: null,
                selectedAccountPopup: null, preSaveModal: null, showAutoSaveModal: false,
                confirmImportData: null, showSuccessModal: false, showBackupErrorModal: false,
                exportData: '', importData: '', importMsg: { text: '', isError: false }, copySuccess: false,
                saveMonthStr: '', manualHistoryMonth: '',
                selectedHistoryId: null, historyEditMode: null, tempHistoryEditData: null,
            },

            getIconHTML: function(name, size = 24, className = '') {
                const mappedName = ICON_MAP[name] || name;
                return `<span class="material-symbols-outlined ${className}" style="font-size: ${size}px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;">${mappedName}</span>`;
            },

            getColorForName: function(name) {
                if (!name) return 'bg-gray-400';
                let hash = 0;
                for (let i = 0; i < name.length; i++) { hash = name.charCodeAt(i) + ((hash << 5) - hash); }
                hash = Math.abs(hash); return ITEM_COLORS[hash % ITEM_COLORS.length];
            },

            calcAmount: function(str) {
                if (str === null || str === undefined || str === '') return 0;
                if (typeof str === 'number') return str;
                try {
                    let sanitized = str.toString().replace(/[０-９＋－＊／．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '').replace(/[^0-9+\-*/.]/g, '');
                    if (!sanitized) return 0;
                    const tokens = sanitized.match(/[+\-*/]|[^+\-*/]+/g);
                    if (!tokens) return 0;
                    let stack = [], currentOp = '+';
                    for (let i = 0; i < tokens.length; i++) {
                        const token = tokens[i];
                        if (['+', '-', '*', '/'].includes(token)) { currentOp = token; } 
                        else {
                            let num = parseFloat(token) || 0;
                            if (currentOp === '+') stack.push(num); else if (currentOp === '-') stack.push(-num); else if (currentOp === '*') stack.push((stack.pop() || 0) * num); else if (currentOp === '/') stack.push(num !== 0 ? (stack.pop() || 0) / num : 0);
                        }
                    }
                    return Math.floor(stack.reduce((sum, val) => sum + val, 0));
                } catch (e) { return 0; }
            },

            formatCurrency: function(amountStr) {
                const num = App.calcAmount(amountStr);
                return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(num);
            },

            getDisplayAmountHTML: function(str, className = "") {
                const num = App.calcAmount(str);
                const strVal = String(str || '');
                const hasMath = /[+\-*/]/.test(strVal.replace(/[＋－＊／]/g, '+'));
                return `<div class="flex flex-col items-end ${className}"><span class="font-bold">${App.formatCurrency(num)}</span>${hasMath ? `<span class="text-[10px] text-gray-400 font-mono -mt-1 tracking-tighter">(${escapeHTML(str)})</span>` : ''}</div>`;
            },

            getCurrentMonthStr: function() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; },
            getPreviousMonthStr: function() { const d = new Date(); d.setMonth(d.getMonth() - 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; },
            cleanInput: function(val) { return String(val || '').replace(/,/g, ''); },

            getNiceMax: function(val) {
                if (val <= 0) return 40000;
                const pow = Math.pow(10, Math.floor(Math.log10(val)));
                const frac = val / pow;
                let niceFrac;
                if (frac <= 1) niceFrac = 1; else if (frac <= 1.2) niceFrac = 1.2; else if (frac <= 1.6) niceFrac = 1.6;
                else if (frac <= 2) niceFrac = 2; else if (frac <= 4) niceFrac = 4; else if (frac <= 6) niceFrac = 6;
                else if (frac <= 8) niceFrac = 8; else niceFrac = 10;
                return niceFrac * pow;
            },

            safeLoadArray: function(keys) {
                for (let key of keys) {
                    try {
                        const data = localStorage.getItem(key);
                        if (data) {
                            const parsed = JSON.parse(data);
                            if (Array.isArray(parsed)) return parsed;
                        }
                    } catch(e) {}
                }
                return [];
            },

            loadData: function() {
                App.state.accounts = App.safeLoadArray([STORAGE_KEY + 'accounts', 'mpm_vanilla_v7_accounts']);
                App.state.wallets = App.safeLoadArray([STORAGE_KEY + 'wallets', 'mpm_vanilla_v7_wallets']);
                App.state.incomes = App.safeLoadArray([STORAGE_KEY + 'incomes', 'mpm_vanilla_v7_incomes']);
                
                const rawPayments = App.safeLoadArray([STORAGE_KEY + 'payments', 'mpm_vanilla_v7_payments']);
                App.state.payments = rawPayments.map(p => ({
                    ...p, category: p.category || (p.isFixed ? 'fixed' : 'variable'), 
                    subItems: (Array.isArray(p.subItems) ? p.subItems : []).map(s => ({...s, category: s.category || (s.isFixed ? 'fixed' : 'variable')}))
                }));
                
                App.state.history = App.safeLoadArray([STORAGE_KEY + 'history', 'mpm_vanilla_v7_history']);
                App.state.specialPayments = App.safeLoadArray([STORAGE_KEY + 'specialPayments']); // ★追加
                App.state.memos = App.safeLoadArray([STORAGE_KEY + 'memos']); // ★追加

                App.state.saveMonthStr = App.getCurrentMonthStr();
                App.state.manualHistoryMonth = App.getPreviousMonthStr();
            },

            saveData: function() {
                localStorage.setItem(STORAGE_KEY + 'accounts', JSON.stringify(App.state.accounts));
                localStorage.setItem(STORAGE_KEY + 'wallets', JSON.stringify(App.state.wallets));
                localStorage.setItem(STORAGE_KEY + 'incomes', JSON.stringify(App.state.incomes));
                localStorage.setItem(STORAGE_KEY + 'payments', JSON.stringify(App.state.payments));
                localStorage.setItem(STORAGE_KEY + 'history', JSON.stringify(App.state.history));
                localStorage.setItem(STORAGE_KEY + 'specialPayments', JSON.stringify(App.state.specialPayments)); // ★追加
                localStorage.setItem(STORAGE_KEY + 'memos', JSON.stringify(App.state.memos)); // ★追加
            },

            totals: {},
            calculateTotals: function() {
                const s = App.state;
                let totalAccountsNum = 0, totalWalletsNum = 0;
                let activeAccountIncomes = 0, totalAccountIncomes = 0;
                let activeWalletsOutgo = 0;
                let activeIncomesList = 0, totalIncomesList = 0;
                let activePayments = 0, totalPaymentsNum = 0;
                
                const catTotals = { loan: 0, fixed: 0, variable: 0, investment: 0 };
                const allCatTotals = { loan: 0, fixed: 0, variable: 0, investment: 0 };

                s.accounts.forEach(a => {
                    totalAccountsNum += App.calcAmount(a.amount);
                    const inc = App.calcAmount(a.incomingAmount);
                    totalAccountIncomes += inc;
                    if (!a.isIncomingDone) activeAccountIncomes += inc;
                });
                s.wallets.forEach(w => {
                    totalWalletsNum += App.calcAmount(w.amount);
                    if (!w.isOutgoDone) activeWalletsOutgo += App.calcAmount(w.outgoAmount);
                });
                s.incomes.forEach(i => {
                    const amt = App.calcAmount(i.amount);
                    totalIncomesList += amt;
                    if (!i.isDone) activeIncomesList += amt;
                });
                s.payments.forEach(p => {
                    const pAmt = App.calcAmount(p.amount);
                    totalPaymentsNum += pAmt;
                    if (!p.isDone) activePayments += pAmt;
                    
                    let subTotal = 0;
                    if (p.subItems && p.subItems.length > 0) {
                        p.subItems.forEach(sub => {
                            const sAmt = App.calcAmount(sub.amount);
                            subTotal += sAmt;
                            const sCat = sub.category || 'variable';
                            if (!p.isDone && catTotals[sCat] !== undefined) catTotals[sCat] += sAmt;
                            if (allCatTotals[sCat] !== undefined) allCatTotals[sCat] += sAmt;
                        });
                    }
                    const diff = pAmt - subTotal;
                    if (diff > 0) {
                        const pCat = p.category || 'variable';
                        if (!p.isDone && catTotals[pCat] !== undefined) catTotals[pCat] += diff;
                        if (allCatTotals[pCat] !== undefined) allCatTotals[pCat] += diff;
                    }
                });

                // ★ 特別支出の当月分をキャッシュフローに合算する処理
                const currentMonth = App.getCurrentMonthStr();
                let currentMonthSpecialAmt = 0;
                let totalSpecialAmt = 0;
                let totalMonthlyRequired = 0; // 毎月の積立必要額

                const curDate = new Date();
                const curY = curDate.getFullYear();
                const curM = curDate.getMonth() + 1;

                s.specialPayments.forEach(sp => {
                    if (!sp.isDone) {
                        const amt = App.calcAmount(sp.amount);
                        totalSpecialAmt += amt;
                        
                        // 今月支払いのものがあれば合算
                        if (sp.targetMonth === currentMonth) {
                            currentMonthSpecialAmt += amt;
                            activePayments += amt; // キャッシュフローの支払いに上乗せ
                        }

                        // 積立額の計算
                        if (sp.targetMonth) {
                            const [ty, tm] = sp.targetMonth.split('-');
                            let monthsLeft = (parseInt(ty) - curY) * 12 + (parseInt(tm) - curM) + 1;
                            if (monthsLeft < 1) monthsLeft = 1; // 過ぎているものや当月のものは1ヶ月で計算
                            totalMonthlyRequired += Math.ceil(amt / monthsLeft);
                        }
                    }
                });

                const remainingIncomes = Math.max(0, activeIncomesList - activeAccountIncomes);
                const activeFinalBalance = totalAccountsNum + totalWalletsNum + activeAccountIncomes + remainingIncomes - activePayments - activeWalletsOutgo;
                const calculatedEndBalance = totalAccountsNum + totalWalletsNum;

                App.totals = { 
                    totalAccountsNum, totalWalletsNum, activeAccountIncomes, totalAccountIncomes, 
                    activeWalletsOutgo, activeIncomesList, totalIncomesList, remainingIncomes, 
                    activePayments, totalPaymentsNum, catTotals, allCatTotals, activeFinalBalance, calculatedEndBalance,
                    totalSpecialAmt, totalMonthlyRequired, currentMonthSpecialAmt
                };
            },

            createHistoryDetails: function() {
                let details = { loan: [], fixed: [], variable: [], investment: [] };
                App.state.payments.forEach(p => {
                    let subTotal = 0;
                    if (p.subItems && p.subItems.length > 0) {
                        p.subItems.forEach(sub => {
                            const amt = App.calcAmount(sub.amount);
                            const cat = sub.category || 'variable';
                            if (details[cat] && amt > 0) details[cat].push({ id: 'd_' + Date.now() + Math.random().toString(), name: sub.name, amount: amt });
                            subTotal += amt;
                        });
                    }
                    const diff = App.calcAmount(p.amount) - subTotal;
                    if (diff > 0) {
                        const cat = p.category || 'variable';
                        if (details[cat]) details[cat].push({ id: 'd_' + Date.now() + Math.random().toString(), name: p.name, amount: diff });
                    }
                });
                
                // ★ 特別支出の当月分を明細に追加してグラフに反映させる
                const currentMonth = App.getCurrentMonthStr();
                App.state.specialPayments.forEach(sp => {
                    if (!sp.isDone && sp.targetMonth === currentMonth) {
                        const amt = App.calcAmount(sp.amount);
                        if (amt > 0) {
                            details['fixed'].push({ id: 'd_sp_' + Date.now() + Math.random().toString(), name: '[特] ' + sp.name, amount: amt });
                        }
                    }
                });

                return details;
            },

            createIncomeDetails: function() {
                let details = [];
                App.state.incomes.forEach(i => {
                    const amt = App.calcAmount(i.amount);
                    if (amt > 0) details.push({ id: 'i_' + Date.now() + Math.random().toString(), name: i.name, amount: amt });
                });
                return details;
            },

            setTab: function(tab) { App.state.activeTab = tab; App.render(); },
            setDashTab: function(tab) { App.state.dashTab = tab; App.render(); },
            setChartMode: function(mode) { App.state.chartMode = mode; App.render(); },
            
            selectHistory: function(id) {
                if (App.state.historyEditMode) return;
                App.state.selectedHistoryId = App.state.selectedHistoryId === id ? null : id;
                App.render();
            },
            
            addAccount: function(e, form) { e.preventDefault(); App.state.accounts.push({ id: Date.now(), name: form.accName.value, amount: App.cleanInput(form.accAmount.value), incomingAmount: App.cleanInput(form.accIncoming.value), isIncomingDone: false, memo: form.accMemo.value }); App.saveData(); App.render(); },
            addWallet: function(e, form) { e.preventDefault(); App.state.wallets.push({ id: Date.now(), name: form.walName.value, amount: App.cleanInput(form.walAmount.value), outgoAmount: App.cleanInput(form.walOutgo.value), isOutgoDone: false, isOutgoFixed: form.walIsFixed.checked, memo: form.walMemo.value }); App.saveData(); App.render(); },
            addIncome: function(e, form) { e.preventDefault(); App.state.incomes.push({ id: Date.now(), name: form.incName.value, amount: App.cleanInput(form.incAmount.value), isFixed: form.incIsFixed.checked, isDone: false, memo: form.incMemo.value }); App.saveData(); App.render(); },
            addPayment: function(e, form) { e.preventDefault(); App.state.payments.push({ id: Date.now(), name: form.payName.value, amount: App.cleanInput(form.payAmount.value), dueDate: form.payDueDate.value ? Number(form.payDueDate.value) : null, endDate: form.payEndDate.value || '', accountId: form.payAccountId.value ? Number(form.payAccountId.value) : '', category: form.payCat.value, isDone: false, memo: form.payMemo.value, subItems: [] }); App.saveData(); App.render(); },
            addSubItem: function(e, form, paymentId) { e.preventDefault(); const newItem = { id: Date.now(), name: form.subName.value, amount: App.cleanInput(form.subAmount.value), category: form.subCat.value, endDate: '', memo: form.subMemo.value }; App.state.payments = App.state.payments.map(p => p.id === paymentId ? { ...p, subItems: [...(p.subItems||[]), newItem] } : p); App.saveData(); App.render(); },
            
            // ★ 新機能：特別支出とメモの追加
            addSpecialPayment: function(e, form) { e.preventDefault(); App.state.specialPayments.push({ id: Date.now(), name: form.spName.value, amount: App.cleanInput(form.spAmount.value), targetMonth: form.spMonth.value, memo: form.spMemo.value, isDone: false }); App.saveData(); App.render(); },
            addMemo: function(e, form) { e.preventDefault(); App.state.memos.push({ id: Date.now(), title: form.mTitle.value, targetDate: form.mDate.value, content: form.mContent.value }); App.state.memos.sort((a,b)=>new Date(a.targetDate) - new Date(b.targetDate)); App.saveData(); App.render(); },

            toggleDone: function(type, id, e) {
                if (e) e.stopPropagation();
                if (type === 'account') App.state.accounts = App.state.accounts.map(a => a.id === id ? { ...a, isIncomingDone: !a.isIncomingDone } : a);
                if (type === 'wallet') App.state.wallets = App.state.wallets.map(w => w.id === id ? { ...w, isOutgoDone: !w.isOutgoDone } : w);
                if (type === 'income') App.state.incomes = App.state.incomes.map(i => i.id === id ? { ...i, isDone: !i.isDone } : i);
                if (type === 'payment') App.state.payments = App.state.payments.map(p => p.id === id ? { ...p, isDone: !p.isDone } : p);
                if (type === 'special') App.state.specialPayments = App.state.specialPayments.map(sp => sp.id === id ? { ...sp, isDone: !sp.isDone } : sp);
                App.saveData(); App.render();
            },
            toggleExpand: function(id, e) { if (e) e.stopPropagation(); if (App.state.expandedPayIds.has(id)) App.state.expandedPayIds.delete(id); else App.state.expandedPayIds.add(id); App.render(); },
            moveItem: function(type, index, direction, e) { if (e) e.stopPropagation(); let list = App.state[type]; const newIndex = index + direction; if (newIndex < 0 || newIndex >= list.length) return; [list[index], list[newIndex]] = [list[newIndex], list[index]]; App.saveData(); App.render(); },
            requestDelete: function(type, id, name, e) { if (e) e.stopPropagation(); App.state.deleteTarget = { type, id, name }; App.render(); },
            executeDelete: function() {
                const t = App.state.deleteTarget; if (!t) return;
                if (t.type === 'account') { App.state.accounts = App.state.accounts.filter(item => item.id !== t.id); App.state.payments = App.state.payments.map(p => p.accountId === t.id ? { ...p, accountId: '' } : p); } 
                else if (t.type === 'subItem') { App.state.payments = App.state.payments.map(p => ({ ...p, subItems: (p.subItems||[]).filter(s => s.id !== t.id) })); } 
                else if (t.type === 'history') { App.state.history = App.state.history.filter(item => item.id !== t.id); App.state.selectedHistoryId = null; App.state.historyEditMode = null; }
                else if (t.type === 'specialPayment') { App.state.specialPayments = App.state.specialPayments.filter(item => item.id !== t.id); }
                else if (t.type === 'memo') { App.state.memos = App.state.memos.filter(item => item.id !== t.id); }
                else { App.state[t.type + 's'] = App.state[t.type + 's'].filter(item => item.id !== t.id); }
                App.state.deleteTarget = null; App.saveData(); App.render();
            },
            closeModal: function(modalName) { 
                App.state[modalName] = null; 
                if (modalName === 'showAutoSaveModal') App.state.showAutoSaveModal = false; 
                if (modalName === 'showSuccessModal') App.state.showSuccessModal = false; 
                if (modalName === 'showBackupErrorModal') App.state.showBackupErrorModal = false;
                App.render(); 
            },
            openAccountPopup: function(id) { App.state.selectedAccountPopup = id; App.render(); },

            startEdit: function(type, id, e) { if (e) e.stopPropagation(); App.state.editMode = { type, id }; App.render(); },
            cancelEdit: function(e) { if (e) e.stopPropagation(); App.state.editMode = null; App.render(); },
            saveEdit: function(e, type, id, paymentId) {
                e.preventDefault(); const form = e.target;
                if (type === 'account') App.state.accounts = App.state.accounts.map(a => a.id === id ? { ...a, name: form.name.value, amount: App.cleanInput(form.amount.value), incomingAmount: App.cleanInput(form.incomingAmount.value), memo: form.memo.value } : a);
                else if (type === 'wallet') App.state.wallets = App.state.wallets.map(w => w.id === id ? { ...w, name: form.name.value, amount: App.cleanInput(form.amount.value), outgoAmount: App.cleanInput(form.outgoAmount.value), isOutgoFixed: form.isOutgoFixed.checked, memo: form.memo.value } : w);
                else if (type === 'income') App.state.incomes = App.state.incomes.map(i => i.id === id ? { ...i, name: form.name.value, amount: App.cleanInput(form.amount.value), isFixed: form.isFixed.checked, memo: form.memo.value } : i);
                else if (type === 'payment') App.state.payments = App.state.payments.map(p => p.id === id ? { ...p, name: form.name.value, amount: App.cleanInput(form.amount.value), dueDate: form.dueDate.value ? Number(form.dueDate.value) : null, endDate: form.endDate.value || '', accountId: form.accountId.value ? Number(form.accountId.value) : '', category: form.category.value, memo: form.memo.value } : p);
                else if (type === 'subItem') App.state.payments = App.state.payments.map(p => { if (p.id === paymentId) { return { ...p, subItems: p.subItems.map(s => s.id === id ? { ...s, name: form.name.value, amount: App.cleanInput(form.amount.value), category: form.category.value, memo: form.memo.value } : s) }; } return p; });
                else if (type === 'special') App.state.specialPayments = App.state.specialPayments.map(sp => sp.id === id ? { ...sp, name: form.name.value, amount: App.cleanInput(form.amount.value), targetMonth: form.targetMonth.value, memo: form.memo.value } : sp);
                else if (type === 'memo') { App.state.memos = App.state.memos.map(m => m.id === id ? { ...m, title: form.title.value, targetDate: form.targetDate.value, content: form.content.value } : m); App.state.memos.sort((a,b)=>new Date(a.targetDate) - new Date(b.targetDate)); }
                App.state.editMode = null; App.saveData(); App.render();
            },

            executeMonthlyReset: function() {

                App.state.wallets.forEach(w => { w.outgoAmount = w.isOutgoFixed ? w.outgoAmount : ''; w.isOutgoDone = false; });
                App.state.incomes.forEach(i => { i.amount = i.isFixed ? i.amount : ''; i.isDone = false; });
                App.state.payments.forEach(p => { p.amount = p.category === 'variable' ? '' : p.amount; p.isDone = false; if (p.subItems) p.subItems.forEach(s => { s.amount = s.category === 'variable' ? '' : s.amount; }); });

                const payment = Number(document.getElementById('pre-save-payment').value) || 0;
                const balance = Number(document.getElementById('pre-save-balance').value) || 0;
                const income = Number(document.getElementById('pre-save-income').value) || 0;

                App.state.preSaveModal = null; App.saveData(); App.render();

            startHistoryEdit: function(id) { 
                const sel = App.state.history.find(h => h.id === id);
                if (!sel) return;
                App.state.historyEditMode = id; 
                let temp = JSON.parse(JSON.stringify(sel));
                if (!temp.details) {
                    temp.details = { loan: [], fixed: [], variable: [], investment: [] };
                    if (temp.catTotals) { Object.keys(temp.catTotals).forEach(cat => { if (temp.catTotals[cat] > 0) temp.details[cat].push({ id: 'old_'+cat, name: CAT_LABELS[cat].label + '合計', amount: temp.catTotals[cat] }); }); } 
                    else { temp.details.variable.push({ id: 'old_all', name: '過去の支払い合計', amount: temp.payment }); }
                }
                if(temp.income === undefined) temp.income = 0;
                if(!temp.incomeDetails) { temp.incomeDetails = temp.income > 0 ? [{ id: 'old_inc', name: '過去の収入合計', amount: temp.income }] : []; }
                App.state.tempHistoryEditData = temp;
                App.render(); 
            },
            cancelHistoryEdit: function() { App.state.historyEditMode = null; App.state.tempHistoryEditData = null; App.render(); },
            
            updateTempHistoryDetail: function(cat, itemId, amountStr) {
                const temp = App.state.tempHistoryEditData;
                if (!temp || !temp.details || !temp.details[cat]) return;
                const item = temp.details[cat].find(i => i.id === itemId);
                if (item) {
                    item.amount = amountStr;
                    temp.catTotals = { loan: 0, fixed: 0, variable: 0, investment: 0 };
                    temp.payment = 0;
                    Object.keys(temp.details).forEach(c => { temp.details[c].forEach(d => { const a = App.calcAmount(d.amount); temp.catTotals[c] += a; temp.payment += a; }); });
                }
                App.render();
            },
            updateTempHistoryIncomeDetail: function(itemId, amountStr) {
                const temp = App.state.tempHistoryEditData;
                if (!temp || !temp.incomeDetails) return;
                const item = temp.incomeDetails.find(i => i.id === itemId);
                if (item) {
                    item.amount = amountStr;
                    temp.income = 0;
                    temp.incomeDetails.forEach(d => { temp.income += App.calcAmount(d.amount); });
                }
                App.render();
            },
            updateTempHistoryBalance: function(amountStr) { if(App.state.tempHistoryEditData) App.state.tempHistoryEditData.balance = App.calcAmount(amountStr); },
            updateTempHistoryIncome: function(amountStr) { if(App.state.tempHistoryEditData) App.state.tempHistoryEditData.income = App.calcAmount(amountStr); },
            
            saveHistoryEdit: function(e) {
                e.preventDefault();
                const id = App.state.historyEditMode; const temp = App.state.tempHistoryEditData; if (!temp) return;
                const balInput = document.getElementById('edit-hist-balance'); if (balInput) temp.balance = App.calcAmount(balInput.value);
                const incInput = document.getElementById('edit-hist-income'); if (incInput) temp.income = App.calcAmount(incInput.value);
                App.state.history = App.state.history.map(h => h.id === id ? temp : h);
                App.state.historyEditMode = null; App.state.tempHistoryEditData = null; App.saveData(); App.render();
            },

            // --- バックアップ ---
            safeMemo: function(memo) { return String(memo || '').replace(/,/g, '，').replace(/\n/g, ' '); },
            generateExportText: function() {
                let txt = "---支払い管理バックアップ---\n\n【手元現金】\n";
                App.state.wallets.forEach(w => txt += `${w.id},${w.name},${w.amount||0},${w.outgoAmount||0},${w.isOutgoDone?1:0},${w.isOutgoFixed?1:0},${App.safeMemo(w.memo)}\n`);
                txt += "\n【口座】\n";
                App.state.accounts.forEach(a => txt += `${a.id},${a.name},${a.amount||0},${a.incomingAmount||0},${a.isIncomingDone?1:0},${App.safeMemo(a.memo)}\n`);
                txt += "\n【入金】\n";
                App.state.incomes.forEach(i => txt += `${i.id},${i.name},${i.amount||0},${i.isFixed?1:0},${i.isDone?1:0},${App.safeMemo(i.memo)}\n`);
                txt += "\n【支払い】\n";
                App.state.payments.forEach(p => {
                    txt += `${p.id},${p.name},${p.amount||0},${p.dueDate||''},${p.accountId||''},${p.category||'variable'},${p.isDone?1:0},${App.safeMemo(p.memo)},${p.endDate||''}\n`;
                    if (p.subItems && p.subItems.length > 0) p.subItems.forEach(s => { txt += `>${s.id},${s.name},${s.amount||0},${s.category||'variable'},${s.endDate||''},${App.safeMemo(s.memo)}\n`; });
                });
                txt += "\n【特別支出】\n";
                App.state.specialPayments.forEach(sp => { txt += `${sp.id},${sp.name},${sp.amount||0},${sp.targetMonth||''},${sp.isDone?1:0},${App.safeMemo(sp.memo)}\n`; });
                txt += "\n【メモ】\n";
                App.state.memos.forEach(m => { txt += `${m.id},${m.title},${m.targetDate||''},${App.safeMemo(m.content)}\n`; });
                txt += "\n【履歴】\n";
                App.state.history.forEach(h => {
                    const detailsBase64 = h.details ? btoa(unescape(encodeURIComponent(JSON.stringify(h.details)))) : '';
                    const incomeDetailsBase64 = h.incomeDetails ? btoa(unescape(encodeURIComponent(JSON.stringify(h.incomeDetails)))) : '';
                    txt += `${h.id},${h.label},${h.payment},${h.balance},${h.catTotals?.loan||0},${h.catTotals?.fixed||0},${h.catTotals?.variable||0},${h.catTotals?.investment||0},${detailsBase64},${h.income||0},${incomeDetailsBase64}\n`;
                });
                return txt;
            },
            handleGenerateExport: function() { try { App.state.exportData = App.generateExportText(); App.state.copySuccess = false; App.state.importMsg = { text: '', isError: false }; App.render(); } catch (e) { App.state.importMsg = { text: '出力エラー', isError: true }; App.render(); } },
            handleDownloadExport: function() {
                try {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([App.generateExportText()], { type: 'text/plain' }));
                    const d = new Date(); a.download = `payment_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.txt`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch (e) { alert('ファイル保存に失敗しました。'); }
            },
            handleCopy: function() {
                if (!App.state.exportData) return;
                const fallbackCopy = () => { const ta = document.createElement("textarea"); ta.value = App.state.exportData; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); App.state.copySuccess = true; App.render(); setTimeout(() => {App.state.copySuccess = false; App.render();}, 3000); } catch (err) {} document.body.removeChild(ta); };
                if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(App.state.exportData).then(() => { App.state.copySuccess = true; App.render(); setTimeout(() => {App.state.copySuccess = false; App.render();}, 3000); }).catch(fallbackCopy); } else { fallbackCopy(); }
            },
            handleFileUpload: function(input) {
                const file = input.files[0]; if (!file) return; const reader = new FileReader();
                reader.onload = (ev) => { App.state.importData = ev.target.result; App.state.importMsg = { text: 'ファイルを読み込みました。「復元を実行」を押してください。', isError: false }; App.render(); };
                reader.readAsText(file); input.value = null;
            },
            handleImportClick: function() {
                const text = document.getElementById('import-data-text').value;
                if (!text || !text.trim()) { App.state.importMsg = { text: 'データを入力するかファイルを選択してください。', isError: true }; App.render(); return; }
                try {
                    const lines = text.replace(/，/g, ',').replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).split('\n');
                    let mode = ''; const nA = [], nW = [], nI = [], nP = [], nH = [], nSP = [], nM = []; let currP = null;
                    for(let i=0; i<lines.length; i++) {
                        let line = lines[i].trim(); if (!line || line.startsWith('---')) continue; if (line.startsWith('【')) { mode = line; continue; }
                        const pts = line.split(',');
                        if (mode === '【口座】' && pts.length >= 3) {
                            let incAmt = ''; let isIncDone = false; let memo = '';
                            if (pts.length === 4) { memo = pts[3]; } else if (pts.length === 5) { incAmt = pts[3]; memo = pts[4]; } else if (pts.length >= 6) { incAmt = pts[3]; isIncDone = pts[4] === '1'; memo = pts.slice(5).join(','); }
                            nA.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], incomingAmount: incAmt, isIncomingDone: isIncDone, memo: memo });
                        }
                        else if (mode === '【手元現金】' && pts.length >= 3) { nW.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], outgoAmount: pts[3] || '', isOutgoDone: pts[4] === '1', isOutgoFixed: pts[5] === '1', memo: pts.slice(6).join(',') }); }
                        else if (mode === '【入金】' && pts.length >= 3) {
                            let isFixed = false; let isDone = false; let memo = '';
                            if (pts.length === 4) { memo = pts[3]; } else if (pts.length === 5) { isFixed = pts[3] === '1'; memo = pts[4]; } else if (pts.length >= 6) { isFixed = pts[3] === '1'; isDone = pts[4] === '1'; memo = pts.slice(5).join(','); }
                            nI.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], isFixed: isFixed, isDone: isDone, memo: memo });
                        }
                        else if (mode === '【支払い】') {
                            if (line.startsWith('>') && currP && pts.length >= 4) {
                                let cat = 'variable'; let endDate = ''; let memo = '';
                                if (pts.length === 6) { cat = (pts[3] === '1' || pts[3] === '0') ? (pts[3]==='1'?'fixed':'variable') : pts[3]; endDate = pts[4]; memo = pts[5]; } 
                                else if (pts.length >= 7) { cat = (pts[3] === '1' || pts[3] === '0') ? (pts[3]==='1'?'fixed':'variable') : pts[3]; endDate = pts[4]; memo = pts.slice(5).join(','); }
                                currP.subItems.push({ id: Number(pts[0].substring(1)), name: pts[1], amount: pts[2], category: cat, endDate: endDate, memo: memo });
                            }
                            else if (pts.length >= 3) {
                                let dueDate = pts[3] ? Number(pts[3]) : null; let accountId = pts[4] ? Number(pts[4]) : ''; let cat = 'variable'; let isDone = false; let memo = ''; let endDate = '';
                                if (pts.length === 6) { memo = pts[5]; } else if (pts.length === 7) { cat = pts[5] === '1' ? 'fixed' : 'variable'; memo = pts[6]; } else if (pts.length >= 8) { cat = (pts[5] === '1' || pts[5] === '0') ? (pts[5]==='1'?'fixed':'variable') : pts[5]; isDone = pts[6] === '1'; memo = pts[7]; }
                                if (pts.length >= 9) { endDate = pts[8]; memo = pts.slice(7, -1).join(','); } else { memo = pts.slice(7).join(','); } // 拡張フォーマット用
                                currP = { id: Number(pts[0]), name: pts[1], amount: pts[2], dueDate: dueDate, endDate: endDate, accountId: accountId, category: cat, isDone: isDone, memo: memo, subItems: [] };
                                nP.push(currP);
                            }
                        } else if (mode === '【特別支出】' && pts.length >= 3) {
                            nSP.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], targetMonth: pts[3]||'', isDone: pts[4]==='1', memo: pts.slice(5).join(',') });
                        } else if (mode === '【メモ】' && pts.length >= 3) {
                            nM.push({ id: Number(pts[0]), title: pts[1], targetDate: pts[2]||'', content: pts.slice(3).join(',') });
                        } else if (mode === '【履歴】' && pts.length >= 4) {
                            let catTotals = null; let details = null; let income = 0; let incomeDetails = null;
                            if (pts.length >= 8) { catTotals = { loan: Number(pts[4])||0, fixed: Number(pts[5])||0, variable: Number(pts[6])||0, investment: Number(pts[7])||0 }; if (catTotals.loan === 0 && catTotals.fixed === 0 && catTotals.variable === 0 && catTotals.investment === 0) catTotals = null; }
                            if (pts.length >= 9 && pts[8]) { try { details = JSON.parse(decodeURIComponent(escape(atob(pts[8])))); } catch(e) {} }
                            if (pts.length >= 10 && pts[9]) { income = Number(pts[9]) || 0; }
                            if (pts.length >= 11 && pts[10]) { try { incomeDetails = JSON.parse(decodeURIComponent(escape(atob(pts[10])))); } catch(e) {} }
                            nH.push({ id: pts[0], label: pts[1], payment: Number(pts[2]), balance: Number(pts[3]), catTotals, details, income, incomeDetails });
                        }
                    }
                    App.state.confirmImportData = { accounts: nA, wallets: nW, incomes: nI, payments: nP, history: nH, specialPayments: nSP, memos: nM }; App.state.importMsg = { text: '', isError: false }; App.render();
                } catch (e) { App.state.importMsg = { text: 'データの解析に失敗しました。ファイルが正しくない可能性があります。', isError: true }; App.render(); }
            },
            executeImport: function() { const data = App.state.confirmImportData; if (!data) return; App.state.accounts = data.accounts; App.state.wallets = data.wallets; App.state.incomes = data.incomes; App.state.payments = data.payments; App.state.history = data.history; App.state.specialPayments = data.specialPayments || []; App.state.memos = data.memos || []; App.state.importData = ''; App.state.confirmImportData = null; App.state.showSuccessModal = true; App.saveData(); App.render(); },

            // --- サブ描画群 ---
            renderDashboard: function() {
                const s = App.state;
                let html = `
                    <div class="space-y-4 animate-fade-in">

                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                        html += `</div>`;
                    }
                }

                html += `</div>`;
                return html;
            },

            renderSettings: function() {
                return `
                    <div class="bg-white rounded-2xl p-6 shadow-md border border-gray-100 animate-zoom-in space-y-8">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 pb-3 border-b border-gray-100">${App.getIconHTML('refresh', 24, 'text-red-500')} 手動月替わりリセット</h2>
                            <p class="text-sm text-gray-600 mb-4">今すぐ「済」マークの全解除と、変動費の数値を一括で空欄にしたい場合は以下のボタンを押してください。</p>
                            <button onclick="App.handleManualResetClick()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 px-5 rounded-lg text-sm transition-colors flex items-center gap-1 shadow-sm">${App.getIconHTML('refresh', 18)} 今すぐ一括リセットを実行</button>

                        <div>
                            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 pb-3 border-b border-gray-100">${App.getIconHTML('settings', 24, 'text-gray-600')} データのバックアップ・復元</h2>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                                    <p class="text-sm text-gray-600 mb-4">現在の全てのデータをテキストファイルとして保存、またはコピペ用にテキスト出力します。</p>
                                    <div class="flex flex-col sm:flex-row gap-3 mb-4">
                                        <button onclick="App.handleDownloadExport()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2 shadow-sm">${App.getIconHTML('download', 20)} ファイルで保存</button>
                                        <button onclick="App.handleGenerateExport()" class="flex-1 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 font-bold py-2 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">${App.getIconHTML('file-text', 20)} テキスト表示</button>
                                    </div>
                                    ${App.state.exportData ? `
                                        <div class="relative animate-fade-in">

                                    <p class="text-sm text-gray-600 mb-4">保存したテキストファイルを読み込むか、枠内にテキストを貼り付けて復元します。</p>
                                    <div class="mb-4">

                                            ${App.getIconHTML('file-text', 28, 'text-emerald-500')}
                                            <span class="text-sm font-bold text-emerald-700 text-center">ファイルを選択して読込</span>
                                            <input type="file" accept=".txt" class="hidden" onchange="App.handleFileUpload(this)" />

                                    <div class="flex items-center gap-4 mb-4"><div class="flex-1 h-px bg-emerald-200"></div><span class="text-xs text-emerald-600 font-bold">または</span><div class="flex-1 h-px bg-emerald-200"></div></div>
                                    <textarea id="import-data-text" oninput="App.state.importData=this.value" placeholder="ここにバックアップテキストを貼り付け" class="w-full h-24 p-3 text-xs font-mono bg-white border border-emerald-200 rounded-lg outline-none resize-y shadow-inner mb-4">${escapeHTML(App.state.importData)}</textarea>
                                    <div class="flex flex-col gap-3 mt-auto">
                                        ${App.state.importMsg.text ? `
                                            <div class="p-3 rounded-lg text-sm font-bold flex items-start gap-2 animate-fade-in ${App.state.importMsg.isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-emerald-100 text-emerald-800 border border-emerald-200'}">
                                                ${App.getIconHTML(App.state.importMsg.isError ? 'alert-triangle' : 'check-circle-2', 20)}
                                                <span>${escapeHTML(App.state.importMsg.text)}</span>
                                            </div>
                                        ` : ''}
                                        <button onclick="App.handleImportClick()" class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 text-white font-bold py-3 px-6 rounded-lg text-sm flex items-center justify-center gap-2 shadow-sm">
                                            ${App.getIconHTML('upload', 20)} 復元を実行する
                                        </button>

                                </div>

            renderModals: function() {
                let html = '';
                const s = App.state;

                if (s.showBackupErrorModal) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div class="flex justify-center mb-4 text-red-500">${App.getIconHTML('error_outline', 40)}</div>
                                <h3 class="text-xl font-bold text-gray-800 mb-2">バックアップ失敗</h3>
                                <p class="text-sm text-gray-600 mb-6">iPhoneの仕様やブラウザの制限により、自動でのファイル作成に失敗しました。<br>「設定」タブから手動でテキストをコピーして保存してください。</p>
                                <button onclick="App.closeModal('showBackupErrorModal')" class="w-full py-2.5 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700">閉じる</button>
                            </div>
                        </div>
                    `;
                }

                if (s.preSaveModal) {
                    html += `
                        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                                <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">${App.getIconHTML('save', 24, 'text-indigo-600')} 履歴データの保存</h3>
                                <p class="text-sm text-gray-600 mb-4 font-bold">${escapeHTML(s.preSaveModal.label)}のデータとして以下を保存します。金額は自由に修正可能です。</p>
                                <div class="space-y-3 mb-6">
                                    <div><label class="text-xs font-bold text-gray-500 mb-1 block">総入金・収入 (自動計算済)</label><input type="number" id="pre-save-income" value="${s.preSaveModal.income||0}" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-300" /></div>
                                    <div><label class="text-xs font-bold text-gray-500 mb-1 block">発生総支払 (自動計算済)</label><input type="number" id="pre-save-payment" value="${s.preSaveModal.payment}" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-rose-300" /></div>
                                    <div><label class="text-xs font-bold text-gray-500 mb-1 block">月末残高 (現在の口座＋現金)</label><input type="number" id="pre-save-balance" value="${s.preSaveModal.balance}" class="w-full px-3 py-2 border border-emerald-300 bg-emerald-50 rounded-lg focus:ring-2 focus:ring-emerald-400 font-bold" /></div>
                                </div>
                                <div class="flex justify-end gap-2"><button onclick="App.closeModal('preSaveModal')" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg">キャンセル</button><button onclick="App.confirmSaveHistory()" class="px-6 py-2 bg-indigo-600 text-white font-bold hover:bg-indigo-700 rounded-lg shadow-md">保存を実行</button></div>
                            </div>
                        </div>
                    `;
                }

                if (s.showAutoSaveModal) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div class="mx-auto w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">${App.getIconHTML('check-circle-2', 32)}</div>
                                <h3 class="text-xl font-bold text-gray-800 mb-2">前月データの自動保存</h3><p class="text-sm text-gray-600 mb-6">月替わりを検知したため、前月の最終状態を推移グラフに自動保存し、変動費をリセットしました。<br><br>続いてファイルのバックアップを生成します。</p>
                                <button onclick="App.handleAutoSaveConfirm()" class="w-full py-2.5 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700">確認してバックアップ</button>
                            </div>
                        </div>
                    `;
                }

                if (s.deleteTarget) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                                <div class="flex items-center gap-3 text-red-600 mb-4">${App.getIconHTML('alert-triangle', 28)}<h3 class="text-lg font-bold">削除の確認</h3></div>
                                <p class="text-gray-600 mb-6 leading-relaxed">「<span class="font-bold">${escapeHTML(s.deleteTarget.name)}</span>」を削除してもよろしいですか？</p>
                                <div class="flex justify-end gap-3"><button onclick="App.closeModal('deleteTarget')" class="px-4 py-2 hover:bg-gray-100 rounded-lg font-bold text-gray-600">キャンセル</button><button onclick="App.executeDelete()" class="px-4 py-2 bg-red-500 text-white font-bold rounded-lg">削除する</button></div>
                            </div>
                        </div>
                    `;
                }

                if (s.confirmImportData) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div class="flex justify-center mb-4 text-amber-500">${App.getIconHTML('alert-triangle', 32)}</div>
                                <h3 class="text-xl font-bold text-gray-800 mb-2">復元の確認</h3><p class="text-sm text-gray-600 mb-6">現在のデータはすべて上書きされます。よろしいですか？</p>
                                <div class="flex justify-center gap-3"><button onclick="App.closeModal('confirmImportData')" class="px-4 py-2 font-bold text-gray-600 hover:bg-gray-100 rounded-lg">キャンセル</button><button onclick="App.executeImport()" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg">復元を実行</button></div>
                            </div>
                        </div>
                    `;
                }

                if (s.showSuccessModal) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div class="mx-auto w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">${App.getIconHTML('check-circle-2', 32)}</div>
                                <h3 class="text-xl font-bold text-gray-800 mb-2">復元完了</h3><p class="text-gray-600 mb-6">データの復元が正常に完了しました。</p>
                                <button onclick="App.closeModal('showSuccessModal')" class="w-full py-2.5 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700">閉じる</button>
                            </div>
                        </div>
                    `;
                }

                if (s.selectedAccountPopup !== null) {
                    const acc = s.accounts.find(a => a.id === s.selectedAccountPopup);
                    if (acc) {
                        const relPays = s.payments.filter(p => p.accountId === acc.id);
                        const activeOut = relPays.filter(p => !p.isDone).reduce((sum, p) => sum + App.calcAmount(p.amount), 0);
                        const expected = App.calcAmount(acc.amount) + (acc.isIncomingDone ? 0 : App.calcAmount(acc.incomingAmount)) - activeOut;
                        html += `
                            <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in" onclick="App.closeModal('selectedAccountPopup')">
                                <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[85vh] animate-zoom-in" onclick="event.stopPropagation()">
                                    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-blue-50/50 rounded-t-2xl">
                                        <div><h3 class="text-xl font-bold text-gray-800">${escapeHTML(acc.name)}</h3><p class="text-sm text-gray-500 font-medium mt-1">現在残高: <span class="font-bold text-gray-800">${App.formatCurrency(acc.amount)}</span></p></div>
                                        <button onclick="App.closeModal('selectedAccountPopup')" class="p-2 text-gray-400 hover:bg-white rounded-full bg-gray-50">${App.getIconHTML('x', 24)}</button>
                                    </div>
                                    <div class="p-5 overflow-y-auto">
                                        <h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">${App.getIconHTML('arrow-up-from-line', 20, 'text-rose-500')} 引落予定の明細一覧</h4>
                        `;
                        if (relPays.length > 0) {
                            html += `<div class="space-y-2">`;
                            relPays.forEach(p => {
                                html += `
                                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 text-sm shadow-sm ${p.isDone ? 'opacity-40 bg-gray-50' : ''}">
                                        <div>
                                            <span class="font-bold block mb-1 ${p.isDone?'line-through':''}">${escapeHTML(p.name)}</span>
                                            <div class="flex gap-2 text-[10px]">${p.dueDate ? `<span class="bg-gray-50 border px-1.5 py-0.5 rounded text-gray-500 flex items-center gap-1">${App.getIconHTML('calendar', 12)}${p.dueDate}日引落</span>` : ''}${p.isDone ? `<span class="bg-rose-100 text-rose-700 font-bold px-1.5 py-0.5 rounded">済</span>` : ''}</div>
                                        </div>
                                        ${App.getDisplayAmountHTML(p.amount, "text-gray-800")}
                                    </div>
                                `;
                            });
                            html += `</div>`;
                        } else {
                            html += `<p class="py-8 text-center text-sm text-gray-500 border border-dashed rounded-xl">引落予定はありません</p>`;
                        }
                        html += `
                                    </div>
                                    <div class="p-5 border-t bg-gray-50 rounded-b-2xl">
                                        <div class="flex justify-between text-sm font-bold mb-2"><span class="text-gray-600">未済引落合計</span><span class="text-rose-600">-${App.formatCurrency(activeOut)}</span></div>
                                        <div class="flex justify-between pt-3 border-t border-gray-200"><span class="text-sm font-bold text-gray-600">引落後予想残高</span><span class="font-black text-xl ${expected < 0 ? 'text-red-600' : 'text-emerald-600'}">${App.formatCurrency(expected)}</span></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                return html;
            },

            init: function() {
                App.loadData();
                const currentMonth = App.getCurrentMonthStr();
                const lastOpenedMonth = localStorage.getItem(STORAGE_KEY + 'last_opened_month');
                
                if (lastOpenedMonth && lastOpenedMonth !== currentMonth) {
                    App.calculateTotals();
                    const existingHistory = App.state.history;
                    if (!existingHistory.some(h => h.id === lastOpenedMonth)) {
                        const [y, m] = lastOpenedMonth.split('-');
                        const label = `${y.slice(2)}年${parseInt(m, 10)}月`;
                        const autoRecord = { 
                            id: lastOpenedMonth, 
                            label, 
                            payment: App.totals.totalPaymentsNum, 
                            balance: App.totals.calculatedEndBalance,
                            income: App.totals.totalIncomesList,
                            catTotals: App.totals.allCatTotals,
                            details: App.createHistoryDetails(),
                            incomeDetails: App.createIncomeDetails()
                        };
                        existingHistory.push(autoRecord);
                        existingHistory.sort((a, b) => a.id.localeCompare(b.id));
                        App.state.showAutoSaveModal = true;
                    }
                    App.executeMonthlyReset();
                    App.saveData();
                }
                localStorage.setItem(STORAGE_KEY + 'last_opened_month', currentMonth);
                App.render();
            }
        };

        window.App = App;
        document.addEventListener('DOMContentLoaded', () => { App.init(); });

    </script>
</body>
</html>
