<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="apple-touch-icon" href="bank.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-title" content="支払管理">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毎月の支払い管理</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          user-select: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'mpm_v12_';

        // --- 金額の数式計算機能 ---
        const calcAmount = (str) => {
            if (!str) return 0;
            if (typeof str === 'number') return str;
            try {
                // 全角数字・記号を半角に変換
                const halfStr = str.toString().replace(/[０-９＋－＊／．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/ /g, '');
                // 危険な文字を排除して計算
                const sanitized = halfStr.replace(/[^-()\d/*+.]/g, '');
                if (!sanitized) return 0;
                return Math.floor(Function('"use strict";return (' + sanitized + ')')() || 0);
            } catch (e) {
                return 0;
            }
        };

        const formatCurrency = (amountStr) => {
            const num = calcAmount(amountStr);
            return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(num);
        };

        const DisplayAmount = ({ str, className = "" }) => {
            const num = calcAmount(str);
            const strVal = String(str || '');
            const hasMath = /[+*+/-]/.test(strVal.replace(/[＋－＊／]/g, '+'));
            return (
                <div className={`flex flex-col items-end ${className}`}>
                    <span className="font-bold">{formatCurrency(num)}</span>
                    {hasMath && <span className="text-[10px] text-gray-400 font-mono -mt-1 tracking-tighter">({str})</span>}
                </div>
            );
        };

        const getCurrentMonthStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };
        const getPreviousMonthStr = () => { const d = new Date(); d.setMonth(d.getMonth() - 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };

        const CAT_LABELS = {
            'loan': { label: 'ローン', icon: 'home', color: 'text-purple-600', bg: 'bg-purple-100', border: 'border-purple-200' },
            'fixed': { label: '固定費', icon: 'receipt_long', color: 'text-indigo-600', bg: 'bg-indigo-100', border: 'border-indigo-200' },
            'variable': { label: '変動費', icon: 'credit_card', color: 'text-rose-600', bg: 'bg-rose-100', border: 'border-rose-200' },
            'investment': { label: '投資', icon: 'trending_up', color: 'text-emerald-600', bg: 'bg-emerald-100', border: 'border-emerald-200' }
        };

        const Icon = ({ name, size = 24, className = '', ...props }) => {
            const iconMap = {
                'wallet': 'account_balance_wallet', 'arrow-down-to-line': 'vertical_align_bottom',
                'arrow-up-from-line': 'vertical_align_top', 'alert-circle': 'error_outline',
                'check-circle-2': 'check_circle', 'calculator': 'calculate', 'calendar': 'calendar_today',
                'chevron-down': 'expand_more', 'chevron-up': 'expand_less', 'bar-chart-3': 'bar_chart',
                'layout-dashboard': 'dashboard', 'save': 'save', 'info': 'info', 'building-2': 'account_balance',
                'alert-triangle': 'warning', 'x': 'close', 'settings': 'settings', 'copy': 'content_copy',
                'download': 'download', 'upload': 'upload', 'file-text': 'description', 'check': 'check',
                'plus': 'add', 'trash-2': 'delete', 'pencil': 'edit', 'message-square': 'chat_bubble_outline',
                'done': 'done_all', 'undo': 'undo', 'refresh': 'refresh', 'payments': 'payments',
                'home': 'home', 'receipt_long': 'receipt_long', 'credit_card': 'credit_card', 'trending_up': 'trending_up'
            };
            return <span className={`material-symbols-outlined ${className}`} style={{ fontSize: `${size}px`, lineHeight: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}>{iconMap[name] || name}</span>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [dashTab, setDashTab] = useState('accounts'); // 新規：ダッシュボード内のサブタブ

            const [deleteTarget, setDeleteTarget] = useState(null);
            const [selectedAccountPopup, setSelectedAccountPopup] = useState(null);
            const [showAutoSaveModal, setShowAutoSaveModal] = useState(false);
            const [confirmImportData, setConfirmImportData] = useState(null);
            
            const [editMode, setEditMode] = useState(null);
            const [historyEditMode, setHistoryEditMode] = useState(null);
            const [preSaveModal, setPreSaveModal] = useState(null); // 月末残高編集用モーダル

            // --- メインデータ ---
            // 過去のデータ引き継ぎ時は isFixed -> category に変換
            const migratePayments = (pts) => pts.map(p => ({ ...p, category: p.category || (p.isFixed ? 'fixed' : 'variable'), subItems: (p.subItems || []).map(s => ({...s, category: s.category || (s.isFixed ? 'fixed' : 'variable')})) }));

            const [accounts, setAccounts] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY + 'accounts') || localStorage.getItem('mpm_v11_accounts') || '[]'));
            const [wallets, setWallets] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY + 'wallets') || localStorage.getItem('mpm_v11_wallets') || '[]'));
            const [incomes, setIncomes] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY + 'incomes') || localStorage.getItem('mpm_v11_incomes') || '[]'));
            const [payments, setPayments] = useState(() => migratePayments(JSON.parse(localStorage.getItem(STORAGE_KEY + 'payments') || localStorage.getItem('mpm_v11_payments') || '[]')));
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY + 'history') || localStorage.getItem('mpm_v11_history') || '[]'));

            const [accName, setAccName] = useState(''); const [accAmount, setAccAmount] = useState(''); const [accIncoming, setAccIncoming] = useState(''); const [accMemo, setAccMemo] = useState('');
            const [walName, setWalName] = useState(''); const [walAmount, setWalAmount] = useState(''); const [walOutgo, setWalOutgo] = useState(''); const [walIsFixed, setWalIsFixed] = useState(false); const [walMemo, setWalMemo] = useState('');
            const [incName, setIncName] = useState(''); const [incAmount, setIncAmount] = useState(''); const [incIsFixed, setIncIsFixed] = useState(false); const [incMemo, setIncMemo] = useState('');
            const [payName, setPayName] = useState(''); const [payAmount, setPayAmount] = useState(''); const [payDueDate, setPayDueDate] = useState(''); const [payAccountId, setPayAccountId] = useState(''); const [payCat, setPayCat] = useState('variable'); const [payMemo, setPayMemo] = useState('');
            
            const [expandedPayIds, setExpandedPayIds] = useState(new Set());
            const [subInputs, setSubInputs] = useState({}); 

            const [exportData, setExportData] = useState('');
            const [importData, setImportData] = useState('');
            const [importMsg, setImportMsg] = useState({ text: '', isError: false });

            // --- 計算処理 ---
            const totalAccountsNum = useMemo(() => accounts.reduce((sum, item) => sum + calcAmount(item.amount), 0), [accounts]);
            const totalWalletsNum = useMemo(() => wallets.reduce((sum, item) => sum + calcAmount(item.amount), 0), [wallets]);
            
            const activeAccountIncomes = useMemo(() => accounts.reduce((sum, item) => sum + (item.isIncomingDone ? 0 : calcAmount(item.incomingAmount)), 0), [accounts]);
            const totalAccountIncomes = useMemo(() => accounts.reduce((sum, item) => sum + calcAmount(item.incomingAmount), 0), [accounts]);
            
            const activeWalletsOutgo = useMemo(() => wallets.reduce((sum, item) => sum + (item.isOutgoDone ? 0 : calcAmount(item.outgoAmount)), 0), [wallets]);

            const activeIncomesList = useMemo(() => incomes.reduce((sum, item) => sum + (item.isDone ? 0 : calcAmount(item.amount)), 0), [incomes]);
            const remainingIncomes = Math.max(0, activeIncomesList - activeAccountIncomes);
            
            const activePayments = useMemo(() => payments.reduce((sum, item) => sum + (item.isDone ? 0 : calcAmount(item.amount)), 0), [payments]);
            const totalPaymentsNum = useMemo(() => payments.reduce((sum, item) => sum + calcAmount(item.amount), 0), [payments]);
            
            // カテゴリ別集計（未済のみ）
            const catTotals = useMemo(() => {
                const totals = { loan: 0, fixed: 0, variable: 0, investment: 0 };
                payments.forEach(p => {
                    if (p.isDone) return;
                    let subTotal = 0;
                    if (p.subItems && p.subItems.length > 0) {
                        p.subItems.forEach(s => {
                            const sAmt = calcAmount(s.amount);
                            subTotal += sAmt;
                            totals[s.category || 'variable'] += sAmt;
                        });
                    }
                    const pAmt = calcAmount(p.amount);
                    const diff = pAmt - subTotal;
                    if (diff > 0) totals[p.category || 'variable'] += diff;
                });
                return totals;
            }, [payments]);

            // 自動計算される月末残高（口座＋現金）
            const calculatedEndBalance = totalAccountsNum + totalWalletsNum;

            useEffect(() => {
                const currentMonth = getCurrentMonthStr();
                const lastOpenedMonth = localStorage.getItem(STORAGE_KEY + 'last_opened_month');
                
                if (lastOpenedMonth && lastOpenedMonth !== currentMonth) {
                    const existingHistory = JSON.parse(localStorage.getItem(STORAGE_KEY + 'history') || '[]');
                    if (!existingHistory.some(h => h.id === lastOpenedMonth)) {
                        const [y, m] = lastOpenedMonth.split('-');
                        const label = `${y.slice(2)}年${parseInt(m, 10)}月`;
                        // ※自動保存時は現在の口座＋現金を「月末残高」とする
                        const autoRecord = { id: lastOpenedMonth, label, payment: totalPaymentsNum, balance: calculatedEndBalance };
                        const updatedHistory = [...existingHistory, autoRecord].sort((a, b) => a.id.localeCompare(b.id));
                        setHistory(updatedHistory);
                        localStorage.setItem(STORAGE_KEY + 'history', JSON.stringify(updatedHistory));
                        setShowAutoSaveModal(true);
                    }
                    executeMonthlyReset();
                }
                localStorage.setItem(STORAGE_KEY + 'last_opened_month', currentMonth);
            }, [totalPaymentsNum, calculatedEndBalance]);

            const executeMonthlyReset = () => {
                setAccounts(prev => prev.map(a => ({ ...a, incomingAmount: '', isIncomingDone: false })));
                setWallets(prev => prev.map(w => ({ ...w, outgoAmount: w.isOutgoFixed ? w.outgoAmount : '', isOutgoDone: false })));
                setIncomes(prev => prev.map(i => ({ ...i, amount: i.isFixed ? i.amount : '', isDone: false })));
                // 支払い：変動費のみ空欄にする
                setPayments(prev => prev.map(p => ({
                    ...p, amount: p.category === 'variable' ? '' : p.amount, isDone: false,
                    subItems: (p.subItems || []).map(s => ({ ...s, amount: s.category === 'variable' ? '' : s.amount }))
                })));
            };

            const handleManualResetClick = () => { if (window.confirm('すべての「済」を解除し、変動費の金額をリセットします。')) { executeMonthlyReset(); alert('リセットしました。'); } };

            useEffect(() => { localStorage.setItem(STORAGE_KEY + 'accounts', JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY + 'wallets', JSON.stringify(wallets)); }, [wallets]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY + 'incomes', JSON.stringify(incomes)); }, [incomes]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY + 'payments', JSON.stringify(payments)); }, [payments]);
            useEffect(() => { localStorage.setItem(STORAGE_KEY + 'history', JSON.stringify(history)); }, [history]);

            // --- 金額入力用ヘルパー（カンマを除去） ---
            const cleanInput = (val) => val.replace(/,/g, '');

            // --- 追加ハンドラ ---
            const handleAddAccount = (e) => { e.preventDefault(); if(!accName) return; setAccounts([...accounts, { id: Date.now(), name: accName, amount: cleanInput(accAmount), incomingAmount: cleanInput(accIncoming), isIncomingDone: false, memo: accMemo }]); setAccName(''); setAccAmount(''); setAccIncoming(''); setAccMemo(''); };
            const handleAddWallet = (e) => { e.preventDefault(); if(!walName) return; setWallets([...wallets, { id: Date.now(), name: walName, amount: cleanInput(walAmount), outgoAmount: cleanInput(walOutgo), isOutgoDone: false, isOutgoFixed: walIsFixed, memo: walMemo }]); setWalName(''); setWalAmount(''); setWalOutgo(''); setWalIsFixed(false); setWalMemo(''); };
            const handleAddIncome = (e) => { e.preventDefault(); if(!incName) return; setIncomes([...incomes, { id: Date.now(), name: incName, amount: cleanInput(incAmount), isFixed: incIsFixed, isDone: false, memo: incMemo }]); setIncName(''); setIncAmount(''); setIncIsFixed(false); setIncMemo(''); };
            const handleAddPayment = (e) => { e.preventDefault(); if(!payName) return; setPayments([...payments, { id: Date.now(), name: payName, amount: cleanInput(payAmount), dueDate: payDueDate ? Number(payDueDate) : null, accountId: payAccountId ? Number(payAccountId) : '', category: payCat, isDone: false, memo: payMemo, subItems: [] }]); setPayName(''); setPayAmount(''); setPayDueDate(''); setPayAccountId(''); setPayCat('variable'); setPayMemo(''); };
            const handleAddSubItem = (e, paymentId) => {
                e.preventDefault(); const inputs = subInputs[paymentId] || {}; if (!inputs.name) return;
                const newItem = { id: Date.now(), name: inputs.name, amount: cleanInput(inputs.amount || ''), category: inputs.category || 'variable', endDate: inputs.endDate || '', memo: inputs.memo || '' };
                setPayments(payments.map(p => p.id === paymentId ? { ...p, subItems: [...(p.subItems || []), newItem] } : p));
                setSubInputs({ ...subInputs, [paymentId]: { name: '', amount: '', category: 'variable', endDate: '', memo: '' }});
            };

            const toggleExpand = (id) => { const newSet = new Set(expandedPayIds); if (newSet.has(id)) newSet.delete(id); else newSet.add(id); setExpandedPayIds(newSet); };
            const handleDeleteSubItem = (paymentId, subItemId) => { setPayments(payments.map(p => p.id === paymentId ? { ...p, subItems: (p.subItems || []).filter(s => s.id !== subItemId) } : p)); };
            const requestDelete = (type, item) => setDeleteTarget({ type, ...item });
            const executeDelete = () => {
                if (!deleteTarget) return; const { type, id } = deleteTarget;
                if (type === 'account') { setAccounts(accounts.filter(item => item.id !== id)); setPayments(payments.map(p => p.accountId === id ? { ...p, accountId: '' } : p)); }
                if (type === 'wallet') setWallets(wallets.filter(item => item.id !== id));
                if (type === 'income') setIncomes(incomes.filter(item => item.id !== id));
                if (type === 'payment') setPayments(payments.filter(item => item.id !== id));
                setDeleteTarget(null);
            };
            const toggleAccountIncomingDone = (id, e) => { e.stopPropagation(); setAccounts(accounts.map(a => a.id === id ? { ...a, isIncomingDone: !a.isIncomingDone } : a)); };
            const toggleWalletOutgoDone = (id, e) => { e.stopPropagation(); setWallets(wallets.map(w => w.id === id ? { ...w, isOutgoDone: !w.isOutgoDone } : w)); };
            const toggleIncomeDone = (id) => { setIncomes(incomes.map(i => i.id === id ? { ...i, isDone: !i.isDone } : i)); };
            const togglePaymentDone = (id) => { setPayments(payments.map(p => p.id === id ? { ...p, isDone: !p.isDone } : p)); };
            const handleMoveItem = (list, index, direction, setList) => { const newIndex = index + direction; if (newIndex < 0 || newIndex >= list.length) return; const newItems = [...list]; [newItems[index], newItems[newIndex]] = [newItems[newIndex], newItems[index]]; setList(newItems); };

            const startEdit = (type, item, extraProps = {}) => { setEditMode({ type, ...item, ...extraProps }); };
            const saveEdit = (e) => {
                if (e) e.preventDefault(); if (!editMode || !editMode.name) return;
                const amtValue = cleanInput(String(editMode.amount || ''));
                if (editMode.type === 'account') {
                    setAccounts(accounts.map(a => a.id === editMode.id ? { ...a, name: editMode.name, amount: amtValue, incomingAmount: cleanInput(String(editMode.incomingAmount || '')), memo: editMode.memo } : a));
                } else if (editMode.type === 'wallet') {
                    setWallets(wallets.map(w => w.id === editMode.id ? { ...w, name: editMode.name, amount: amtValue, outgoAmount: cleanInput(String(editMode.outgoAmount || '')), isOutgoFixed: editMode.isOutgoFixed, memo: editMode.memo } : w));
                } else if (editMode.type === 'income') {
                    setIncomes(incomes.map(i => i.id === editMode.id ? { ...i, name: editMode.name, amount: amtValue, isFixed: editMode.isFixed, memo: editMode.memo } : i));
                } else if (editMode.type === 'payment') {
                    setPayments(payments.map(p => p.id === editMode.id ? { ...p, name: editMode.name, amount: amtValue, memo: editMode.memo, dueDate: editMode.dueDate ? Number(editMode.dueDate) : null, accountId: editMode.accountId ? Number(editMode.accountId) : '', category: editMode.category } : p));
                } else if (editMode.type === 'subItem') {
                    setPayments(payments.map(p => { if (p.id === editMode.paymentId) { return { ...p, subItems: p.subItems.map(s => s.id === editMode.id ? { ...s, name: editMode.name, amount: amtValue, memo: editMode.memo, category: editMode.category, endDate: editMode.endDate } : s) }; } return p; }));
                }
                setEditMode(null);
            };

            // --- グラフ保存：残高を手動編集可能にする ---
            const triggerSaveHistory = (monthStr) => {
                const [year, month] = monthStr.split('-');
                const label = `${year.slice(2)}年${parseInt(month, 10)}月`;
                setPreSaveModal({
                    id: monthStr, label, payment: totalPaymentsNum, balance: calculatedEndBalance
                });
            };

            const confirmSaveHistory = () => {
                if (!preSaveModal) return;
                const newRecord = { id: preSaveModal.id, label: preSaveModal.label, payment: Number(preSaveModal.payment) || 0, balance: Number(preSaveModal.balance) || 0 };
                const filtered = history.filter(h => h.id !== preSaveModal.id);
                setHistory([...filtered, newRecord].sort((a, b) => a.id.localeCompare(b.id)));
                setPreSaveModal(null);
                alert(`${preSaveModal.label}のデータを保存しました！`);
            };

            const handleSaveHistoryEdit = (e) => {
                e.preventDefault(); if (!historyEditMode) return;
                setHistory(history.map(h => h.id === historyEditMode.id ? { ...h, payment: Number(historyEditMode.payment) || 0, balance: Number(historyEditMode.balance) || 0 } : h)); setHistoryEditMode(null);
            };

            // --- バックアップ ---
            const safeMemo = (memo) => String(memo || '').replace(/,/g, '，').replace(/\n/g, ' ');
            const generateExportText = () => {
                let txt = "---支払い管理バックアップ---\n\n【手元現金】\n";
                wallets.forEach(w => txt += `${w.id},${w.name},${w.amount || 0},${w.outgoAmount || 0},${w.isOutgoDone ? 1 : 0},${w.isOutgoFixed ? 1 : 0},${safeMemo(w.memo)}\n`);
                txt += "\n【口座】\n";
                accounts.forEach(a => txt += `${a.id},${a.name},${a.amount || 0},${a.incomingAmount || 0},${a.isIncomingDone ? 1 : 0},${safeMemo(a.memo)}\n`);
                txt += "\n【入金】\n";
                incomes.forEach(i => txt += `${i.id},${i.name},${i.amount || 0},${i.isFixed ? 1 : 0},${i.isDone ? 1 : 0},${safeMemo(i.memo)}\n`);
                txt += "\n【支払い】\n";
                payments.forEach(p => {
                    txt += `${p.id},${p.name},${p.amount || 0},${p.dueDate || ''},${p.accountId || ''},${p.category || 'variable'},${p.isDone ? 1 : 0},${safeMemo(p.memo)}\n`;
                    if (p.subItems && p.subItems.length > 0) p.subItems.forEach(s => { txt += `>${s.id},${s.name},${s.amount || 0},${s.category || 'variable'},${s.endDate || ''},${safeMemo(s.memo)}\n`; });
                });
                txt += "\n【履歴】\n";
                history.forEach(h => txt += `${h.id},${h.label},${h.payment},${h.balance}\n`);
                return txt;
            };

            const handleGenerateExport = () => { try { setExportData(generateExportText()); setImportMsg({ text: '', isError: false }); } catch (e) { setImportMsg({ text: 'エラー', isError: true }); } };
            const handleDownloadExport = () => {
                try {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([generateExportText()], { type: 'text/plain' }));
                    a.download = `payment_backup_${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}.txt`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch (e) { setImportMsg({ text: 'エラー', isError: true }); }
            };
            const handleImportClick = () => {
                if (!importData.trim()) return;
                try {
                    const lines = importData.replace(/，/g, ',').replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).split('\n');
                    let mode = ''; const nA = [], nW = [], nI = [], nP = [], nH = []; let currP = null;
                    for(let i=0; i<lines.length; i++) {
                        let line = lines[i].trim(); if (!line || line.startsWith('---')) continue; if (line.startsWith('【')) { mode = line; continue; }
                        const pts = line.split(',');
                        if (mode === '【口座】' && pts.length >= 3) nA.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], incomingAmount: pts[3] || '', isIncomingDone: pts[4] === '1', memo: pts.slice(5).join(',') });
                        else if (mode === '【手元現金】' && pts.length >= 3) nW.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], outgoAmount: pts[3] || '', isOutgoDone: pts[4] === '1', isOutgoFixed: pts[5] === '1', memo: pts.slice(6).join(',') });

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="p-6 bg-blue-50 rounded-2xl border border-blue-100 flex flex-col justify-between"><div><p className="text-sm text-blue-600 font-bold mb-1">確保している資金</p><p className="text-xs text-blue-400 mb-4">全口座・現金 ＋ 未済の入金総額</p></div><p className="text-3xl font-black text-blue-800">{formatCurrency(totalAccountsNum + totalWalletsNum + activeAccountIncomes + remainingIncomes)}</p></div>
                                    <div className="p-6 bg-rose-50 rounded-2xl border border-rose-100 flex flex-col justify-between"><div><p className="text-sm text-rose-600 font-bold mb-1">残りの支払い合計</p><p className="text-xs text-rose-400 mb-4">未済の引落・現金消費予定</p></div><p className="text-3xl font-black text-rose-800">{formatCurrency(activePayments + activeWalletsOutgo)}</p></div>
                                    <div className={`p-6 rounded-2xl border-2 flex flex-col justify-between ${activeFinalBalance < 0 ? 'bg-red-50 border-red-300' : 'bg-emerald-50 border-emerald-300 shadow-emerald-100 shadow-lg'}`}><div><p className={`text-sm font-bold flex items-center gap-1.5 mb-1 ${activeFinalBalance < 0 ? 'text-red-600' : 'text-emerald-700'}`}>{activeFinalBalance < 0 ? <Icon name="alert-circle" size={24} /> : <Icon name="check-circle-2" size={24} />}差引予測残高</p><p className={`text-xs mb-4 ${activeFinalBalance < 0 ? 'text-red-400' : 'text-emerald-500'}`}>{activeFinalBalance < 0 ? '資金がショートするリスクがあります' : '引き落とし後も資金は確保できています'}</p></div><p className={`text-4xl font-black tracking-tight ${activeFinalBalance < 0 ? 'text-red-700' : 'text-emerald-700'}`}>{formatCurrency(activeFinalBalance)}</p></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white rounded-2xl p-6 shadow-md border border-gray-100">
                                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4 pb-4 border-b border-gray-100">
                                        <div><h2 className="text-xl font-bold text-gray-800">月次推移グラフ</h2><p className="text-sm text-gray-500">毎月の支払い実績額と、月末最終残高の履歴グラフです。</p></div>
                                        <div className="flex flex-wrap items-center gap-2 bg-indigo-50 p-3 rounded-xl border border-indigo-100 w-full lg:w-auto">
                                            <div className="text-xs font-bold text-indigo-900 block w-full mb-1">💡 現在の状況を過去の月末残高として保存する</div>
                                            <input type="month" value={manualHistoryMonth} onChange={e => setManualHistoryMonth(e.target.value)} className="text-sm px-2 py-1.5 border rounded bg-white" />
                                            <button onClick={() => triggerSaveHistory(manualHistoryMonth)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 transition-colors flex items-center gap-1"><Icon name="save" size={16} /> 保存</button>
                                        </div>
                                    </div>
                                    <div className="h-64 mt-8 flex items-end justify-around gap-2 border-b-2 border-gray-200 pb-2 relative overflow-x-auto hide-scrollbar">
                                        {history.length === 0 ? (<p className="text-gray-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">履歴データがまだありません</p>) : (
                                            history.map((data) => {
                                                const maxPayment = Math.max(...history.map(h => h.payment), 1);
                                                const paymentHeight = (data.payment / maxPayment) * 100;
                                                const isShort = data.balance < 0;
                                                return (
                                                    <div key={data.id} className="flex flex-col items-center flex-1 group min-w-[65px]">
                                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity absolute top-0 bg-gray-800 text-white text-xs p-2 rounded pointer-events-none z-10 whitespace-nowrap"><p>発生総支払: {formatCurrency(data.payment)}</p><p>最終実残高: {formatCurrency(data.balance)}</p></div>
                                                        <div className="w-full flex justify-center items-end gap-1 h-48 relative">
                                                            <div className="w-1/2 max-w-[40px] bg-rose-400 rounded-t-sm transition-all duration-500" style={{ height: `${paymentHeight}%` }}></div>
                                                            <div className={`absolute w-3 h-3 rounded-full border-2 border-white -right-1 z-10 ${isShort ? 'bg-red-500' : 'bg-emerald-500'}`} style={{ bottom: `${Math.max(Math.min((data.balance / maxPayment) * 100, 100), -20)}%` }}></div>
                                                        </div>
                                                        <span className="text-xs text-gray-500 mt-3 font-bold whitespace-nowrap">{data.label}</span>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                    <div className="flex justify-center gap-4 mt-6 text-xs text-gray-600 flex-wrap"><span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-rose-400 rounded-sm"></div>支払い総額</span><span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-emerald-500 rounded-full"></div>月末残高（黒字）</span><span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-red-500 rounded-full"></div>月末残高（赤字）</span></div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 shadow-md border border-gray-100">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="pencil" className="text-gray-500"/> 履歴データの編集・修正（手入力）</h3>
                                    {history.length > 0 ? (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left text-gray-500">
                                                <thead className="text-xs text-gray-700 uppercase bg-gray-50"><tr><th className="px-4 py-3">対象月</th><th className="px-4 py-3">支払い合計額</th><th className="px-4 py-3">月末残高</th><th className="px-4 py-3 text-right">操作</th></tr></thead>
                                                <tbody>
                                                    {history.map(h => {
                                                        const isEditing = historyEditMode?.id === h.id;
                                                        if (isEditing) {
                                                            return (
                                                                <tr key={h.id} className="bg-indigo-50 border-b">
                                                                    <td className="px-4 py-3 font-bold text-gray-900">{h.label}</td>
                                                                    <td className="px-4 py-3"><input type="number" value={historyEditMode.payment} onChange={e=>setHistoryEditMode({...historyEditMode, payment: e.target.value})} className="w-full px-2 py-1 border rounded bg-white text-sm" /></td>
                                                                    <td className="px-4 py-3"><input type="number" value={historyEditMode.balance} onChange={e=>setHistoryEditMode({...historyEditMode, balance: e.target.value})} className="w-full px-2 py-1 border rounded bg-white text-sm" /></td>
                                                                    <td className="px-4 py-3 text-right space-x-1 whitespace-nowrap"><button onClick={() => setHistoryEditMode(null)} className="px-2.5 py-1 text-xs font-bold bg-white text-gray-600 rounded border hover:bg-gray-50">消去</button><button onClick={handleSaveHistoryEdit} className="px-2.5 py-1 text-xs font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">保存</button></td>
                                                                </tr>
                                                            );
                                                        }
                                                        return (
                                                            <tr key={h.id} className="bg-white border-b hover:bg-gray-50">
                                                                <td className="px-4 py-3 font-bold text-gray-900">{h.label}</td>
                                                                <td className="px-4 py-3 font-mono font-bold text-rose-600">{formatCurrency(h.payment)}</td>
                                                                <td className={`px-4 py-3 font-mono font-bold ${h.balance < 0 ? 'text-red-600' : 'text-emerald-600'}`}>{formatCurrency(h.balance)}</td>
                                                                <td className="px-4 py-3 text-right space-x-1 whitespace-nowrap"><button onClick={() => startEdit('history', h)} className="text-gray-400 hover:text-indigo-600 p-1"><Icon name="pencil" size={16}/></button><button onClick={() => handleDeleteHistory(h.id)} className="text-gray-400 hover:text-red-500 p-1"><Icon name="trash-2" size={16}/></button></td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (<p className="text-sm text-gray-400 text-center py-4">データがありません</p>)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-white rounded-2xl p-6 shadow-md border border-gray-100 animate-zoom-in space-y-8">
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 pb-3 border-b border-gray-100"><Icon name="refresh" className="text-red-500" />手動月替わりリセット</h2>
                                    <p className="text-sm text-gray-600 mb-4">今すぐ「済」マークの全解除と、固定費以外の数値を一括で空欄にしたい場合は以下のボタンを押してください。</p>
                                    <button onClick={handleManualResetClick} className="bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 px-5 rounded-lg text-sm transition-colors flex items-center gap-1 shadow-sm"><Icon name="refresh" size={18} />今すぐ一括リセットを実行</button>
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 pb-3 border-b border-gray-100"><Icon name="settings" className="text-gray-600" />データのバックアップ・復元</h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="bg-blue-50/50 p-5 rounded-xl border border-blue-100">
                                            <h3 className="text-lg font-bold text-blue-800 mb-2 flex items-center gap-2"><Icon name="download" size={24} /> バックアップの発行</h3>
                                            <p className="text-sm text-gray-600 mb-4">現在の全てのデータをテキストファイルとして保存、またはコピペ用にテキスト出力します。</p>
                                            <div className="flex flex-col sm:flex-row gap-3 mb-4"><button onClick={handleDownloadExport} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2 shadow-sm"><Icon name="download" size={20} /> ファイルで保存</button><button onClick={handleGenerateExport} className="flex-1 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 font-bold py-2 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2"><Icon name="file-text" size={20} /> テキスト表示</button></div>
                                            {exportData && (<div className="relative animate-fade-in"><textarea readOnly value={exportData} className="w-full h-40 p-3 text-xs font-mono bg-white border border-blue-200 rounded-lg outline-none resize-none shadow-inner text-gray-700 whitespace-pre"></textarea><button onClick={handleCopy} className={`absolute top-2 right-2 p-2 rounded-md font-bold text-xs flex items-center gap-1 transition-all ${copySuccess ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-300'}`}>{copySuccess ? <><Icon name="check" size={16} /> 完了</> : <><Icon name="copy" size={16} /> コピー</>}</button></div>)}
                                        </div>
                                        <div className="bg-emerald-50/50 p-5 rounded-xl border border-emerald-100 flex flex-col">
                                            <h3 className="text-lg font-bold text-emerald-800 mb-2 flex items-center gap-2"><Icon name="upload" size={24} /> データの復元</h3>
                                            <p className="text-sm text-gray-600 mb-4">保存したテキストファイルを読み込むか、枠内にテキストを貼り付けて復元します。</p>
                                            <div className="mb-4"><label className="flex flex-col sm:flex-row items-center justify-center gap-2 w-full bg-white border-2 border-dashed border-emerald-400 rounded-lg p-4 cursor-pointer hover:bg-emerald-50 transition-colors"><Icon name="file-text" size={28} className="text-emerald-500" /><span className="text-sm font-bold text-emerald-700 text-center">ファイルを選択して読込</span><input type="file" accept=".txt" className="hidden" onChange={handleFileUpload} /></label></div>
                                            <div className="flex items-center gap-4 mb-4"><div className="flex-1 h-px bg-emerald-200"></div><span className="text-xs text-emerald-600 font-bold">または</span><div className="flex-1 h-px bg-emerald-200"></div></div>
                                            <textarea placeholder="ここにバックアップテキストを貼り付け" value={importData} onChange={(e) => setImportData(e.target.value)} className="w-full h-24 p-3 text-xs font-mono bg-white border border-emerald-200 rounded-lg outline-none resize-y shadow-inner mb-4"></textarea>
                                            <div className="flex flex-col gap-3 mt-auto">
                                                {importMsg.text && (<div className={`p-3 rounded-lg text-sm font-bold flex items-start gap-2 animate-fade-in ${importMsg.isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-emerald-100 text-emerald-800 border border-emerald-200'}`}><Icon name={importMsg.isError ? 'alert-triangle' : 'check-circle-2'} size={20} /><span>{importMsg.text}</span></div>)}
                                                <button onClick={handleImportClick} disabled={!importData.trim()} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 text-white font-bold py-3 px-6 rounded-lg text-sm flex items-center justify-center gap-2 shadow-sm"><Icon name="upload" size={20} /> 復元を実行する</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
