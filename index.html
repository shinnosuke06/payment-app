<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毎月の支払い管理</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(amount);
        };

        const getCurrentMonthStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        };

        const Icon = ({ name, size = 24, className = '', ...props }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        root: iconRef.current.parentNode
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [selectedAccountPopup, setSelectedAccountPopup] = useState(null);
            const [showHistorySavedModal, setShowHistorySavedModal] = useState(false);
            const [confirmImportData, setConfirmImportData] = useState(null);
            const [showSuccessModal, setShowSuccessModal] = useState(false);

            // --- メインデータ（初期値をすべて空の配列 [] に変更） ---
            const [accounts, setAccounts] = useState(() => {
                const saved = localStorage.getItem('mpm_html_accounts');
                return saved ? JSON.parse(saved) : [];
            });

            const [incomes, setIncomes] = useState(() => {
                const saved = localStorage.getItem('mpm_html_incomes');
                return saved ? JSON.parse(saved) : [];
            });

            const [payments, setPayments] = useState(() => {
                const saved = localStorage.getItem('mpm_html_payments');
                return saved ? JSON.parse(saved) : [];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('mpm_html_history');
                return saved ? JSON.parse(saved) : [];
            });

            // --- 入力フォーム用ステート ---
            const [accName, setAccName] = useState('');
            const [accAmount, setAccAmount] = useState('');
            const [incName, setIncName] = useState('');
            const [incAmount, setIncAmount] = useState('');
            const [payName, setPayName] = useState('');
            const [payAmount, setPayAmount] = useState('');
            const [payDueDate, setPayDueDate] = useState('');
            const [payAccountId, setPayAccountId] = useState('');
            const [expandedPayIds, setExpandedPayIds] = useState(new Set());
            const [subInputs, setSubInputs] = useState({}); 
            const [saveMonthStr, setSaveMonthStr] = useState(getCurrentMonthStr());

            const [exportData, setExportData] = useState('');
            const [importData, setImportData] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);
            const [importMsg, setImportMsg] = useState({ text: '', isError: false });

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => { localStorage.setItem('mpm_html_accounts', JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem('mpm_html_incomes', JSON.stringify(incomes)); }, [incomes]);
            useEffect(() => { localStorage.setItem('mpm_html_payments', JSON.stringify(payments)); }, [payments]);
            useEffect(() => { localStorage.setItem('mpm_html_history', JSON.stringify(history)); }, [history]);

            const totalAccounts = useMemo(() => accounts.reduce((sum, item) => sum + (Number(item.amount) || 0), 0), [accounts]);
            const totalIncomes = useMemo(() => incomes.reduce((sum, item) => sum + (Number(item.amount) || 0), 0), [incomes]);
            const totalPayments = useMemo(() => payments.reduce((sum, item) => sum + (Number(item.amount) || 0), 0), [payments]);
            const finalBalance = totalAccounts + totalIncomes - totalPayments;
            const isShortage = finalBalance < 0;

            const handleAddAccount = (e) => {
                e.preventDefault();
                if (!accName || !accAmount) return;
                setAccounts([...accounts, { id: Date.now(), name: accName, amount: Number(accAmount) }]);
                setAccName(''); setAccAmount('');
            };

            const handleAddIncome = (e) => {
                e.preventDefault();
                if (!incName || !incAmount) return;
                setIncomes([...incomes, { id: Date.now(), name: incName, amount: Number(incAmount) }]);
                setIncName(''); setIncAmount('');
            };

            const handleAddPayment = (e) => {
                e.preventDefault();
                if (!payName || !payAmount) return;
                setPayments([...payments, { 
                    id: Date.now(), name: payName, amount: Number(payAmount),
                    dueDate: payDueDate ? Number(payDueDate) : null,
                    accountId: payAccountId ? Number(payAccountId) : '',
                    subItems: []
                }]);
                setPayName(''); setPayAmount(''); setPayDueDate(''); setPayAccountId('');
            };

            const toggleExpand = (id) => {
                const newSet = new Set(expandedPayIds);
                if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
                setExpandedPayIds(newSet);
            };

            const handleAddSubItem = (e, paymentId) => {
                e.preventDefault();
                const inputs = subInputs[paymentId] || {};
                if (!inputs.name || !inputs.amount) return;
                
                const newItem = {
                    id: Date.now(), name: inputs.name, amount: Number(inputs.amount),
                    isFixed: inputs.isFixed !== false, endDate: inputs.endDate || ''
                };
                
                setPayments(payments.map(p => p.id === paymentId ? { ...p, subItems: [...(p.subItems || []), newItem] } : p));
                setSubInputs({ ...subInputs, [paymentId]: { name: '', amount: '', isFixed: true, endDate: '' }});
            };

            const handleDeleteSubItem = (paymentId, subItemId) => {
                setPayments(payments.map(p => p.id === paymentId ? { ...p, subItems: (p.subItems || []).filter(s => s.id !== subItemId) } : p));
            };

            const requestDelete = (type, item) => setDeleteTarget({ type, ...item });

            const executeDelete = () => {
                if (!deleteTarget) return;
                const { type, id } = deleteTarget;
                if (type === 'account') {
                    setAccounts(accounts.filter(item => item.id !== id));
                    setPayments(payments.map(p => p.accountId === id ? { ...p, accountId: '' } : p));
                }
                if (type === 'income') setIncomes(incomes.filter(item => item.id !== id));
                if (type === 'payment') setPayments(payments.filter(item => item.id !== id));
                setDeleteTarget(null);
            };

            const moveItem = (list, index, direction, setList) => {
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= list.length) return;
                const newItems = [...list];
                [newItems[index], newItems[newIndex]] = [newItems[newIndex], newItems[index]];
                setList(newItems);
            };

            const handleSaveHistory = () => {
                if (!saveMonthStr) return;
                const [year, month] = saveMonthStr.split('-');
                const label = `${year.slice(2)}年${parseInt(month, 10)}月`;
                const newRecord = { id: saveMonthStr, label, payment: totalPayments, balance: finalBalance };
                const filtered = history.filter(h => h.id !== saveMonthStr);
                setHistory([...filtered, newRecord].sort((a, b) => a.id.localeCompare(b.id)));
                setShowHistorySavedModal(true);
            };

            const handleGenerateExport = () => {
                try {
                    let text = "---支払い管理バックアップ---\n\n";
                    text += "【口座】\n";
                    accounts.forEach(a => text += `${a.id},${a.name},${a.amount}\n`);
                    text += "\n【入金】\n";
                    incomes.forEach(i => text += `${i.id},${i.name},${i.amount}\n`);
                    text += "\n【支払い】\n";
                    payments.forEach(p => {
                        text += `${p.id},${p.name},${p.amount},${p.dueDate || ''},${p.accountId || ''}\n`;
                        if (p.subItems && p.subItems.length > 0) {
                            p.subItems.forEach(s => {
                                text += `>${s.id},${s.name},${s.amount},${s.isFixed ? 1 : 0},${s.endDate || ''}\n`;
                            });
                        }
                    });
                    text += "\n【履歴】\n";
                    history.forEach(h => text += `${h.id},${h.label},${h.payment},${h.balance}\n`);

                    setExportData(text);
                    setCopySuccess(false);
                    setImportMsg({ text: '', isError: false });
                } catch (e) {
                    setImportMsg({ text: '出力エラーが発生しました。', isError: true });
                }
            };

            const handleCopy = () => {
                if (!exportData) return;
                const fallbackCopy = () => {
                    const textArea = document.createElement("textarea");
                    textArea.value = exportData;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); setCopySuccess(true); setTimeout(() => setCopySuccess(false), 3000); } 
                    catch (err) { console.error('Copy failed', err); }
                    document.body.removeChild(textArea);
                };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(exportData).then(() => { setCopySuccess(true); setTimeout(() => setCopySuccess(false), 3000); }).catch(fallbackCopy);
                } else {
                    fallbackCopy();
                }
            };

            const handleImportClick = () => {
                if (!importData.trim()) {
                    setImportMsg({ text: 'テキストを入力してください。', isError: true });
                    return;
                }
                try {
                    const fixedText = importData
                        .replace(/，/g, ',')
                        .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                        
                    const lines = fixedText.split('\n');
                    let mode = '';
                    
                    const newAccounts = [];
                    const newIncomes = [];
                    const newPayments = [];
                    const newHistory = [];
                    let currentPayment = null;

                    for(let i=0; i<lines.length; i++) {
                        let line = lines[i].trim();
                        if (!line || line.startsWith('---')) continue;
                        
                        if (line.startsWith('【')) { mode = line; continue; }

                        const parts = line.split(',');
                        if (mode === '【口座】' && parts.length >= 3) {
                            newAccounts.push({ id: Number(parts[0]), name: parts[1], amount: Number(parts[2]) });
                        } else if (mode === '【入金】' && parts.length >= 3) {
                            newIncomes.push({ id: Number(parts[0]), name: parts[1], amount: Number(parts[2]) });
                        } else if (mode === '【支払い】') {
                            if (line.startsWith('>') && currentPayment && parts.length >= 5) {
                                const subId = Number(parts[0].substring(1));
                                currentPayment.subItems.push({
                                    id: subId, name: parts[1], amount: Number(parts[2]), isFixed: parts[3] === '1', endDate: parts[4] || ''
                                });
                            } else if (parts.length >= 5) {
                                currentPayment = {
                                    id: Number(parts[0]), name: parts[1], amount: Number(parts[2]),
                                    dueDate: parts[3] ? Number(parts[3]) : null,
                                    accountId: parts[4] ? Number(parts[4]) : '',
                                    subItems: []
                                };
                                newPayments.push(currentPayment);
                            }
                        } else if (mode === '【履歴】' && parts.length >= 4) {
                            newHistory.push({ id: parts[0], label: parts[1], payment: Number(parts[2]), balance: Number(parts[3]) });
                        }
                    }

                    if (newAccounts.length > 0 || newIncomes.length > 0 || newPayments.length > 0) {
                        setConfirmImportData({ accounts: newAccounts, incomes: newIncomes, payments: newPayments, history: newHistory });
                        setImportMsg({ text: '', isError: false });
                    } else {
                        setImportMsg({ text: 'データを読み取れませんでした。正しい形式か確認してください。', isError: true });
                    }
                } catch (e) {
                    setImportMsg({ text: 'エラー: テキストの読み込みに失敗しました。', isError: true });
                }
            };

            const executeImport = () => {
                if (!confirmImportData) return;
                setAccounts(confirmImportData.accounts);
                setIncomes(confirmImportData.incomes);
                setPayments(confirmImportData.payments);
                if (confirmImportData.history) setHistory(confirmImportData.history);
                setImportData('');
                setConfirmImportData(null);
                setShowSuccessModal(true);
            };

            const SortButtons = ({ onMoveUp, onMoveDown, isFirst, isLast }) => (
                <div className="flex flex-col mr-2 items-center justify-center shrink-0">
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onMoveUp(); }} disabled={isFirst} className={`p-1 rounded transition-colors ${isFirst ? 'text-gray-200' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-700'}`}>
                        <Icon name="chevron-up" size={16} strokeWidth={3} />
                    </button>
                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); onMoveDown(); }} disabled={isLast} className={`p-1 rounded transition-colors ${isLast ? 'text-gray-200' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-700'}`}>
                        <Icon name="chevron-down" size={16} strokeWidth={3} />
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    
                    {deleteTarget && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">
                                <div className="flex items-center gap-3 text-red-600 mb-4"><Icon name="alert-triangle" size={24} /><h3 className="text-lg font-bold">削除の確認</h3></div>
                                <p className="text-gray-600 mb-6 leading-relaxed">「<span className="font-bold">{deleteTarget.name}</span>」を削除してもよろしいですか？<br/>この操作は元に戻せません。</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setDeleteTarget(null)} className="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg">キャンセル</button>
                                    <button onClick={executeDelete} className="px-4 py-2 bg-red-500 text-white font-bold hover:bg-red-600 rounded-lg">削除する</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedAccountPopup && (() => {
                        const acc = selectedAccountPopup;
                        const relPayments = payments.filter(p => p.accountId === acc.id);
                        const totalOut = relPayments.reduce((s, p) => s + p.amount, 0);
                        const expectedBal = acc.amount - totalOut;
                        const isShort = expectedBal < 0;
                        return (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in" onClick={() => setSelectedAccountPopup(null)}>
                                <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[85vh] animate-zoom-in" onClick={e => e.stopPropagation()}>
                                    <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-blue-50/50 rounded-t-2xl">
                                        <div>
                                            <h3 className="text-xl font-bold text-gray-800">{acc.name}</h3>
                                            <p className="text-sm text-gray-500 font-medium mt-1">現在の残高: {formatCurrency(acc.amount)}</p>
                                        </div>
                                        <button onClick={() => setSelectedAccountPopup(null)} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-white rounded-full bg-gray-50"><Icon name="x" size={20} /></button>
                                    </div>
                                    <div className="p-5 overflow-y-auto">
                                        <h4 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                                            <Icon name="arrow-up-from-line" size={16} className="text-rose-500" /> 引き落とし予定 <span className="bg-rose-100 text-rose-700 text-xs px-2 py-0.5 rounded-full ml-auto">{relPayments.length}件</span>
                                        </h4>
                                        {relPayments.length > 0 ? (
                                            <div className="space-y-2">
                                                {relPayments.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 text-sm shadow-sm">
                                                        <div>
                                                            <span className="font-bold text-gray-700 block mb-1">{p.name}</span>
                                                            {p.dueDate && <span className="text-[10px] bg-gray-50 border border-gray-200 px-1.5 py-0.5 rounded text-gray-500 font-medium inline-flex items-center gap-1"><Icon name="calendar" size={10}/> {p.dueDate}日引落</span>}
                                                        </div>
                                                        <span className="font-bold text-gray-800">{formatCurrency(p.amount)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="py-8 text-center bg-gray-50 rounded-xl border border-gray-200 border-dashed"><p className="text-sm text-gray-500">予定はありません</p></div>
                                        )}
                                    </div>
                                    <div className="p-5 border-t border-gray-100 bg-gray-50 rounded-b-2xl">
                                        <div className="flex justify-between items-center mb-2 text-sm font-bold"><span className="text-gray-600">引落合計額</span><span className="text-rose-600">-{formatCurrency(totalOut)}</span></div>
                                        <div className="flex justify-between items-center pt-3 border-t border-gray-200">
                                            <span className="text-sm font-bold text-gray-600">引落後予想残高</span>
                                            <span className={`font-black text-xl ${isShort ? 'text-red-600' : 'text-emerald-600'}`}>
                                                {isShort && <Icon name="alert-triangle" size={16} className="inline mr-1 mb-1" />}{formatCurrency(expectedBal)}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {showHistorySavedModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div className="mx-auto w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-4"><Icon name="save" size={32} /></div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">保存完了</h3>
                                <p className="text-gray-600 mb-6">現在の状態を月次データとして保存しました。</p>
                                <button onClick={() => setShowHistorySavedModal(false)} className="w-full py-2.5 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700">閉じる</button>
                            </div>
                        </div>
                    )}

                    {confirmImportData && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div className="flex items-center justify-center gap-3 text-amber-500 mb-4"><Icon name="alert-triangle" size={28} /><h3 className="text-xl font-bold text-gray-800">復元の確認</h3></div>
                                <p className="text-gray-600 mb-6 leading-relaxed">現在のデータはすべて上書きされ、元に戻せません。<br/>本当に復元してもよろしいですか？</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => setConfirmImportData(null)} className="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg">キャンセル</button>
                                    <button onClick={executeImport} className="px-4 py-2 bg-emerald-600 text-white font-bold hover:bg-emerald-700 rounded-lg">復元を実行</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSuccessModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center animate-zoom-in">
                                <div className="mx-auto w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4"><Icon name="check-circle-2" size={32} /></div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">復元完了</h3>
                                <p className="text-gray-600 mb-6">データの復元が正常に完了しました。</p>
                                <button onClick={() => setShowSuccessModal(false)} className="w-full py-2.5 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700">閉じる</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto space-y-6">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                            <div className="flex items-center gap-3"><Icon name="calculator" className="text-indigo-600" size={28} /><h1 className="text-2xl font-bold text-gray-800">毎月の支払い管理</h1></div>
                            <div className="flex bg-white rounded-lg shadow-sm border p-1 overflow-x-auto hide-scrollbar">
                                <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-4 py-2.5 rounded-md text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'dashboard' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="wallet" size={18} /> 口座・支払い</button>
                                <button onClick={() => setActiveTab('cashflow')} className={`flex items-center gap-2 px-4 py-2.5 rounded-md text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'cashflow' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="layout-dashboard" size={18} /> キャッシュフロー</button>
                                <button onClick={() => setActiveTab('history')} className={`flex items-center gap-2 px-4 py-2.5 rounded-md text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'history' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="bar-chart-3" size={18} /> 推移グラフ</button>
                                <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-2 px-4 py-2.5 rounded-md text-sm font-bold whitespace-nowrap transition-colors ${activeTab === 'settings' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="settings" size={18} /> バックアップ</button>
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="rounded-2xl p-6 shadow-md border bg-blue-50/30 border-blue-100">
                                    <div className="flex items-center justify-between mb-6">
                                        <h3 className="text-xl font-black flex items-center gap-2 text-blue-700"><Icon name="wallet" size={24} /> 現在の口座残高</h3>

                                                    {importMsg.isError ? <Icon name="alert-triangle" size={18} className="shrink-0 mt-0.5" /> : <Icon name="check-circle-2" size={18} className="shrink-0 mt-0.5" />}<span>{importMsg.text}</span>
                                                </div>
                                            )}
                                            <button onClick={handleImportClick} disabled={!importData.trim()} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 text-white font-bold py-3 px-6 rounded-lg text-sm flex items-center justify-center gap-2 shadow-sm transition-colors">
                                                <Icon name="upload" size={18} /> データを復元する
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
