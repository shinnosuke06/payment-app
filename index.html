    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-title" content="支払管理">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毎月の支払い管理</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

        tailwind.config = {

                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }

          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          user-select: none;

        /* ツールチップ用のタップ反応を良くする設定 */
        .group:focus .group-focus\:opacity-100 { opacity: 1; }

</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-24">
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'mpm_vanilla_v4_';

        const escapeHTML = (str) => {
            return String(str || '')
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        };

        const CAT_LABELS = {
            'loan': { label: 'ローン', icon: 'home', color: 'text-purple-600', bg: 'bg-purple-100', border: 'border-purple-200' },
            'fixed': { label: '固定費', icon: 'receipt_long', color: 'text-indigo-600', bg: 'bg-indigo-100', border: 'border-indigo-200' },
            'variable': { label: '変動費', icon: 'credit_card', color: 'text-rose-600', bg: 'bg-rose-100', border: 'border-rose-200' },
            'investment': { label: '投資', icon: 'trending_up', color: 'text-emerald-600', bg: 'bg-emerald-100', border: 'border-emerald-200' }
        };
        const SAFE_CAT = { label: '未分類', icon: 'payments', color: 'text-gray-600', bg: 'bg-gray-100', border: 'border-gray-200' };

        const ICON_MAP = {
            'wallet': 'account_balance_wallet', 'arrow-down-to-line': 'vertical_align_bottom',
            'arrow-up-from-line': 'vertical_align_top', 'alert-circle': 'error_outline',
            'check-circle-2': 'check_circle', 'calculator': 'calculate', 'calendar': 'calendar_today',
            'chevron-down': 'expand_more', 'chevron-up': 'expand_less', 'bar-chart-3': 'bar_chart',
            'layout-dashboard': 'dashboard', 'save': 'save', 'info': 'info', 'building-2': 'account_balance',
            'alert-triangle': 'warning', 'x': 'close', 'settings': 'settings', 'copy': 'content_copy',
            'download': 'download', 'upload': 'upload', 'file-text': 'description', 'check': 'check',
            'plus': 'add', 'trash-2': 'delete', 'pencil': 'edit', 'message-square': 'chat_bubble_outline',
            'done': 'done_all', 'undo': 'undo', 'refresh': 'refresh', 'payments': 'payments',
            'home': 'home', 'receipt_long': 'receipt_long', 'credit_card': 'credit_card', 'trending_up': 'trending_up'
        };

        const App = {
            state: {
                activeTab: 'dashboard', dashTab: 'accounts',
                accounts: [], wallets: [], incomes: [], payments: [], history: [],
                expandedPayIds: new Set(), editMode: null, historyEditMode: null, deleteTarget: null,
                selectedAccountPopup: null, preSaveModal: null, showAutoSaveModal: false,
                confirmImportData: null, showSuccessModal: false,
                exportData: '', importData: '', importMsg: { text: '', isError: false }, copySuccess: false,
                saveMonthStr: '', manualHistoryMonth: '',
            },

            getIconHTML: function(name, size = 24, className = '') {
                const mappedName = ICON_MAP[name] || name;
                return `<span class="material-symbols-outlined ${className}" style="font-size: ${size}px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;">${mappedName}</span>`;
            },

            calcAmount: function(str) {
                if (str === null || str === undefined || str === '') return 0;
                if (typeof str === 'number') return str;
                try {
                    let sanitized = str.toString()
                        .replace(/[０-９＋－＊／．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
                        .replace(/\s+/g, '')
                        .replace(/[^0-9+\-*/.]/g, '');
                    if (!sanitized) return 0;
                    const tokens = sanitized.match(/[+\-*/]|[^+\-*/]+/g);
                    if (!tokens) return 0;
                    let stack = [], currentOp = '+';
                    for (let i = 0; i < tokens.length; i++) {
                        const token = tokens[i];
                        if (['+', '-', '*', '/'].includes(token)) { currentOp = token; } 
                        else {
                            let num = parseFloat(token) || 0;
                            if (currentOp === '+') stack.push(num);
                            else if (currentOp === '-') stack.push(-num);
                            else if (currentOp === '*') stack.push((stack.pop() || 0) * num);
                            else if (currentOp === '/') stack.push(num !== 0 ? (stack.pop() || 0) / num : 0);
                        }
                    }
                    return Math.floor(stack.reduce((sum, val) => sum + val, 0));
                } catch (e) { return 0; }
            },

            formatCurrency: function(amountStr) {
                const num = App.calcAmount(amountStr);
                return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(num);
            },

            getDisplayAmountHTML: function(str, className = "") {
                const num = App.calcAmount(str);
                const strVal = String(str || '');
                const hasMath = /[+\-*/]/.test(strVal.replace(/[＋－＊／]/g, '+'));
                return `<div class="flex flex-col items-end ${className}"><span class="font-bold">${App.formatCurrency(num)}</span>${hasMath ? `<span class="text-[10px] text-gray-400 font-mono -mt-1 tracking-tighter">(${escapeHTML(str)})</span>` : ''}</div>`;
            },

            getCurrentMonthStr: function() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; },
            getPreviousMonthStr: function() { const d = new Date(); d.setMonth(d.getMonth() - 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; },
            cleanInput: function(val) { return String(val || '').replace(/,/g, ''); },

            // ★ グラフの目盛りを「綺麗な数字」にするアルゴリズム
            getNiceMax: function(val) {
                if (val <= 0) return 40000;
                const pow = Math.pow(10, Math.floor(Math.log10(val)));
                const frac = val / pow;
                let niceFrac;
                if (frac <= 1) niceFrac = 1;       // 例: 100,000
                else if (frac <= 1.2) niceFrac = 1.2; // 例: 120,000
                else if (frac <= 1.6) niceFrac = 1.6; // 例: 160,000
                else if (frac <= 2) niceFrac = 2;     // 例: 200,000
                else if (frac <= 4) niceFrac = 4;     // 例: 400,000
                else if (frac <= 6) niceFrac = 6;     // 例: 600,000
                else if (frac <= 8) niceFrac = 8;     // 例: 800,000
                else niceFrac = 10;                   // 例: 1,000,000
                return niceFrac * pow;
            },

            safeLoadArray: function(keys) {
                for (let key of keys) {
                    try {
                        const data = localStorage.getItem(key);
                        if (data) {
                            const parsed = JSON.parse(data);
                            if (Array.isArray(parsed)) return parsed;
                        }
                    } catch(e) {}
                }
                return [];
            },

            loadData: function() {
                App.state.accounts = App.safeLoadArray([STORAGE_KEY + 'accounts', 'mpm_vanilla_v3_accounts', 'mpm_vanilla_v2_accounts']);
                App.state.wallets = App.safeLoadArray([STORAGE_KEY + 'wallets', 'mpm_vanilla_v3_wallets', 'mpm_vanilla_v2_wallets']);
                App.state.incomes = App.safeLoadArray([STORAGE_KEY + 'incomes', 'mpm_vanilla_v3_incomes', 'mpm_vanilla_v2_incomes']);
                
                const rawPayments = App.safeLoadArray([STORAGE_KEY + 'payments', 'mpm_vanilla_v3_payments', 'mpm_vanilla_v2_payments']);
                App.state.payments = rawPayments.map(p => ({
                    ...p, category: p.category || (p.isFixed ? 'fixed' : 'variable'), 
                    subItems: (Array.isArray(p.subItems) ? p.subItems : []).map(s => ({...s, category: s.category || (s.isFixed ? 'fixed' : 'variable')}))
                }));
                
                App.state.history = App.safeLoadArray([STORAGE_KEY + 'history', 'mpm_vanilla_v3_history', 'mpm_vanilla_v2_history']);
                App.state.saveMonthStr = App.getCurrentMonthStr();
                App.state.manualHistoryMonth = App.getPreviousMonthStr();
            },

            saveData: function() {
                localStorage.setItem(STORAGE_KEY + 'accounts', JSON.stringify(App.state.accounts));
                localStorage.setItem(STORAGE_KEY + 'wallets', JSON.stringify(App.state.wallets));
                localStorage.setItem(STORAGE_KEY + 'incomes', JSON.stringify(App.state.incomes));
                localStorage.setItem(STORAGE_KEY + 'payments', JSON.stringify(App.state.payments));
                localStorage.setItem(STORAGE_KEY + 'history', JSON.stringify(App.state.history));
            },

            totals: {},
            calculateTotals: function() {
                const s = App.state;
                let totalAccountsNum = 0, totalWalletsNum = 0;
                let activeAccountIncomes = 0, totalAccountIncomes = 0;
                let activeWalletsOutgo = 0;
                let activeIncomesList = 0, totalIncomesList = 0;
                let activePayments = 0, totalPaymentsNum = 0;
                
                const catTotals = { loan: 0, fixed: 0, variable: 0, investment: 0 };
                const allCatTotals = { loan: 0, fixed: 0, variable: 0, investment: 0 };

                s.accounts.forEach(a => {
                    totalAccountsNum += App.calcAmount(a.amount);
                    const inc = App.calcAmount(a.incomingAmount);
                    totalAccountIncomes += inc;
                    if (!a.isIncomingDone) activeAccountIncomes += inc;
                });
                s.wallets.forEach(w => {
                    totalWalletsNum += App.calcAmount(w.amount);
                    if (!w.isOutgoDone) activeWalletsOutgo += App.calcAmount(w.outgoAmount);
                });
                s.incomes.forEach(i => {
                    const amt = App.calcAmount(i.amount);
                    totalIncomesList += amt;
                    if (!i.isDone) activeIncomesList += amt;
                });
                s.payments.forEach(p => {
                    const pAmt = App.calcAmount(p.amount);
                    totalPaymentsNum += pAmt;
                    if (!p.isDone) activePayments += pAmt;
                    
                    let subTotal = 0;
                    if (p.subItems && p.subItems.length > 0) {
                        p.subItems.forEach(sub => {
                            const sAmt = App.calcAmount(sub.amount);
                            subTotal += sAmt;
                            const sCat = sub.category || 'variable';
                            if (!p.isDone && catTotals[sCat] !== undefined) catTotals[sCat] += sAmt;
                            if (allCatTotals[sCat] !== undefined) allCatTotals[sCat] += sAmt;
                        });
                    }
                    const diff = pAmt - subTotal;
                    if (diff > 0) {
                        const pCat = p.category || 'variable';
                        if (!p.isDone && catTotals[pCat] !== undefined) catTotals[pCat] += diff;
                        if (allCatTotals[pCat] !== undefined) allCatTotals[pCat] += diff;
                    }
                });

                const remainingIncomes = Math.max(0, activeIncomesList - activeAccountIncomes);
                const activeFinalBalance = totalAccountsNum + totalWalletsNum + activeAccountIncomes + remainingIncomes - activePayments - activeWalletsOutgo;
                const calculatedEndBalance = totalAccountsNum + totalWalletsNum;

                App.totals = { 
                    totalAccountsNum, totalWalletsNum, activeAccountIncomes, totalAccountIncomes, 
                    activeWalletsOutgo, activeIncomesList, totalIncomesList, remainingIncomes, 
                    activePayments, totalPaymentsNum, catTotals, allCatTotals, activeFinalBalance, calculatedEndBalance 
                };
            },

            setTab: function(tab) { App.state.activeTab = tab; App.render(); },
            setDashTab: function(tab) { App.state.dashTab = tab; App.render(); },
            
            addAccount: function(e, form) {
                e.preventDefault();
                App.state.accounts.push({ id: Date.now(), name: form.accName.value, amount: App.cleanInput(form.accAmount.value), incomingAmount: App.cleanInput(form.accIncoming.value), isIncomingDone: false, memo: form.accMemo.value });
                App.saveData(); App.render();
            },
            addWallet: function(e, form) {
                e.preventDefault();
                App.state.wallets.push({ id: Date.now(), name: form.walName.value, amount: App.cleanInput(form.walAmount.value), outgoAmount: App.cleanInput(form.walOutgo.value), isOutgoDone: false, isOutgoFixed: form.walIsFixed.checked, memo: form.walMemo.value });
                App.saveData(); App.render();
            },
            addIncome: function(e, form) {
                e.preventDefault();
                App.state.incomes.push({ id: Date.now(), name: form.incName.value, amount: App.cleanInput(form.incAmount.value), isFixed: form.incIsFixed.checked, isDone: false, memo: form.incMemo.value });
                App.saveData(); App.render();
            },
            addPayment: function(e, form) {
                e.preventDefault();
                App.state.payments.push({ id: Date.now(), name: form.payName.value, amount: App.cleanInput(form.payAmount.value), dueDate: form.payDueDate.value ? Number(form.payDueDate.value) : null, accountId: form.payAccountId.value ? Number(form.payAccountId.value) : '', category: form.payCat.value, isDone: false, memo: form.payMemo.value, subItems: [] });
                App.saveData(); App.render();
            },
            addSubItem: function(e, form, paymentId) {
                e.preventDefault();
                const newItem = { id: Date.now(), name: form.subName.value, amount: App.cleanInput(form.subAmount.value), category: form.subCat.value, endDate: form.subEndDate ? form.subEndDate.value : '', memo: form.subMemo.value };
                App.state.payments = App.state.payments.map(p => p.id === paymentId ? { ...p, subItems: [...(p.subItems||[]), newItem] } : p);
                App.saveData(); App.render();
            },

            toggleDone: function(type, id, e) {
                if (e) e.stopPropagation();
                if (type === 'account') App.state.accounts = App.state.accounts.map(a => a.id === id ? { ...a, isIncomingDone: !a.isIncomingDone } : a);
                if (type === 'wallet') App.state.wallets = App.state.wallets.map(w => w.id === id ? { ...w, isOutgoDone: !w.isOutgoDone } : w);
                if (type === 'income') App.state.incomes = App.state.incomes.map(i => i.id === id ? { ...i, isDone: !i.isDone } : i);
                if (type === 'payment') App.state.payments = App.state.payments.map(p => p.id === id ? { ...p, isDone: !p.isDone } : p);
                App.saveData(); App.render();
            },
            toggleExpand: function(id, e) {
                if (e) e.stopPropagation();
                if (App.state.expandedPayIds.has(id)) App.state.expandedPayIds.delete(id);
                else App.state.expandedPayIds.add(id);
                App.render();
            },
            moveItem: function(type, index, direction, e) {
                if (e) e.stopPropagation();
                let list = App.state[type + 's'];
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= list.length) return;
                [list[index], list[newIndex]] = [list[newIndex], list[index]];
                App.saveData(); App.render();
            },
            requestDelete: function(type, id, name, e) { if (e) e.stopPropagation(); App.state.deleteTarget = { type, id, name }; App.render(); },
            executeDelete: function() {
                const t = App.state.deleteTarget; if (!t) return;
                if (t.type === 'account') { App.state.accounts = App.state.accounts.filter(item => item.id !== t.id); App.state.payments = App.state.payments.map(p => p.accountId === t.id ? { ...p, accountId: '' } : p); } 
                else if (t.type === 'subItem') { App.state.payments = App.state.payments.map(p => ({ ...p, subItems: (p.subItems||[]).filter(s => s.id !== t.id) })); } 
                else { App.state[t.type + 's'] = App.state[t.type + 's'].filter(item => item.id !== t.id); }
                App.state.deleteTarget = null; App.saveData(); App.render();
            },
            closeModal: function(modalName) { App.state[modalName] = null; if (modalName === 'showAutoSaveModal') App.state.showAutoSaveModal = false; if (modalName === 'showSuccessModal') App.state.showSuccessModal = false; App.render(); },
            openAccountPopup: function(id) { App.state.selectedAccountPopup = id; App.render(); },

            startEdit: function(type, id, e) { if (e) e.stopPropagation(); App.state.editMode = { type, id }; App.render(); },
            cancelEdit: function(e) { if (e) e.stopPropagation(); App.state.editMode = null; App.render(); },
            saveEdit: function(e, type, id, paymentId) {
                e.preventDefault(); const form = e.target;
                if (type === 'account') App.state.accounts = App.state.accounts.map(a => a.id === id ? { ...a, name: form.name.value, amount: App.cleanInput(form.amount.value), incomingAmount: App.cleanInput(form.incomingAmount.value), memo: form.memo.value } : a);
                else if (type === 'wallet') App.state.wallets = App.state.wallets.map(w => w.id === id ? { ...w, name: form.name.value, amount: App.cleanInput(form.amount.value), outgoAmount: App.cleanInput(form.outgoAmount.value), isOutgoFixed: form.isOutgoFixed.checked, memo: form.memo.value } : w);
                else if (type === 'income') App.state.incomes = App.state.incomes.map(i => i.id === id ? { ...i, name: form.name.value, amount: App.cleanInput(form.amount.value), isFixed: form.isFixed.checked, memo: form.memo.value } : i);
                else if (type === 'payment') App.state.payments = App.state.payments.map(p => p.id === id ? { ...p, name: form.name.value, amount: App.cleanInput(form.amount.value), dueDate: form.dueDate.value ? Number(form.dueDate.value) : null, accountId: form.accountId.value ? Number(form.accountId.value) : '', category: form.category.value, memo: form.memo.value } : p);
                else if (type === 'subItem') App.state.payments = App.state.payments.map(p => { if (p.id === paymentId) { return { ...p, subItems: p.subItems.map(s => s.id === id ? { ...s, name: form.name.value, amount: App.cleanInput(form.amount.value), category: form.category.value, endDate: form.endDate ? form.endDate.value : '', memo: form.memo.value } : s) }; } return p; });
                App.state.editMode = null; App.saveData(); App.render();
            },

            executeMonthlyReset: function() {
                App.state.accounts.forEach(a => { a.incomingAmount = ''; a.isIncomingDone = false; });
                App.state.wallets.forEach(w => { w.outgoAmount = w.isOutgoFixed ? w.outgoAmount : ''; w.isOutgoDone = false; });
                App.state.incomes.forEach(i => { i.amount = i.isFixed ? i.amount : ''; i.isDone = false; });
                App.state.payments.forEach(p => { p.amount = p.category === 'variable' ? '' : p.amount; p.isDone = false; if (p.subItems) p.subItems.forEach(s => { s.amount = s.category === 'variable' ? '' : s.amount; }); });
            },
            handleManualResetClick: function() {
                if (window.confirm('すべての「済」を解除し、変動費の金額をリセットします。')) {
                    App.executeMonthlyReset(); App.saveData(); App.render(); alert('リセットしました。');
                }
            },

            triggerSaveHistory: function() {
                const monthStr = document.getElementById('manualHistoryMonth').value;
                if (!monthStr) return;
                const [year, month] = monthStr.split('-');
                App.state.preSaveModal = {
                    id: monthStr, label: `${year.slice(2)}年${parseInt(month, 10)}月`,
                    payment: App.totals.totalPaymentsNum, balance: App.totals.calculatedEndBalance,
                    catTotals: App.totals.allCatTotals
                };
                App.render();
            },
            confirmSaveHistory: function() {
                const p = App.state.preSaveModal; if (!p) return;
                const payment = Number(document.getElementById('pre-save-payment').value) || 0;
                const balance = Number(document.getElementById('pre-save-balance').value) || 0;
                const filtered = App.state.history.filter(h => h.id !== p.id);
                App.state.history = [...filtered, { id: p.id, label: p.label, payment, balance, catTotals: p.catTotals }].sort((a, b) => a.id.localeCompare(b.id));
                App.state.preSaveModal = null; App.saveData(); App.render();
            },
            startHistoryEdit: function(id) { App.state.historyEditMode = id; App.render(); },
            cancelHistoryEdit: function() { App.state.historyEditMode = null; App.render(); },
            saveHistoryEdit: function(id) {
                const payment = Number(document.getElementById(`edit-hist-${id}-payment`).value) || 0;
                const balance = Number(document.getElementById(`edit-hist-${id}-balance`).value) || 0;
                App.state.history = App.state.history.map(h => h.id === id ? { ...h, payment, balance, catTotals: null } : h);
                App.state.historyEditMode = null; App.saveData(); App.render();
            },

            safeMemo: function(memo) { return String(memo || '').replace(/,/g, '，').replace(/\n/g, ' '); },
            generateExportText: function() {
                let txt = "---支払い管理バックアップ---\n\n【手元現金】\n";
                App.state.wallets.forEach(w => txt += `${w.id},${w.name},${w.amount||0},${w.outgoAmount||0},${w.isOutgoDone?1:0},${w.isOutgoFixed?1:0},${App.safeMemo(w.memo)}\n`);
                txt += "\n【口座】\n";
                App.state.accounts.forEach(a => txt += `${a.id},${a.name},${a.amount||0},${a.incomingAmount||0},${a.isIncomingDone?1:0},${App.safeMemo(a.memo)}\n`);
                txt += "\n【入金】\n";
                App.state.incomes.forEach(i => txt += `${i.id},${i.name},${i.amount||0},${i.isFixed?1:0},${i.isDone?1:0},${App.safeMemo(i.memo)}\n`);
                txt += "\n【支払い】\n";
                App.state.payments.forEach(p => {
                    txt += `${p.id},${p.name},${p.amount||0},${p.dueDate||''},${p.accountId||''},${p.category||'variable'},${p.isDone?1:0},${App.safeMemo(p.memo)}\n`;
                    if (p.subItems && p.subItems.length > 0) p.subItems.forEach(s => { txt += `>${s.id},${s.name},${s.amount||0},${s.category||'variable'},${s.endDate||''},${App.safeMemo(s.memo)}\n`; });
                });
                txt += "\n【履歴】\n";
                App.state.history.forEach(h => {
                    txt += `${h.id},${h.label},${h.payment},${h.balance},${h.catTotals?.loan||0},${h.catTotals?.fixed||0},${h.catTotals?.variable||0},${h.catTotals?.investment||0}\n`;
                });
                return txt;
            },
            handleGenerateExport: function() { try { App.state.exportData = App.generateExportText(); App.state.copySuccess = false; App.state.importMsg = { text: '', isError: false }; App.render(); } catch (e) { App.state.importMsg = { text: '出力エラー', isError: true }; App.render(); } },
            handleDownloadExport: function() {
                try {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([App.generateExportText()], { type: 'text/plain' }));
                    const d = new Date(); a.download = `payment_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.txt`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch (e) { alert('ファイル保存に失敗しました。'); }
            },
            handleCopy: function() {
                if (!App.state.exportData) return;
                const fallbackCopy = () => { const ta = document.createElement("textarea"); ta.value = App.state.exportData; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); App.state.copySuccess = true; App.render(); setTimeout(() => {App.state.copySuccess = false; App.render();}, 3000); } catch (err) {} document.body.removeChild(ta); };
                if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(App.state.exportData).then(() => { App.state.copySuccess = true; App.render(); setTimeout(() => {App.state.copySuccess = false; App.render();}, 3000); }).catch(fallbackCopy); } else { fallbackCopy(); }
            },
            handleFileUpload: function(input) {
                const file = input.files[0]; if (!file) return; const reader = new FileReader();
                reader.onload = (ev) => { App.state.importData = ev.target.result; App.state.importMsg = { text: 'ファイルを読み込みました。「復元を実行」を押してください。', isError: false }; App.render(); };
                reader.readAsText(file); input.value = null;
            },
            handleImportClick: function() {
                const text = document.getElementById('import-data-text').value;
                if (!text || !text.trim()) { App.state.importMsg = { text: 'データを入力するかファイルを選択してください。', isError: true }; App.render(); return; }
                try {
                    const lines = text.replace(/，/g, ',').replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).split('\n');
                    let mode = ''; const nA = [], nW = [], nI = [], nP = [], nH = []; let currP = null;
                    for(let i=0; i<lines.length; i++) {
                        let line = lines[i].trim(); if (!line || line.startsWith('---')) continue; if (line.startsWith('【')) { mode = line; continue; }
                        const pts = line.split(',');
                        if (mode === '【口座】' && pts.length >= 3) {
                            let incAmt = ''; let isIncDone = false; let memo = '';
                            if (pts.length === 4) { memo = pts[3]; } else if (pts.length === 5) { incAmt = pts[3]; memo = pts[4]; } else if (pts.length >= 6) { incAmt = pts[3]; isIncDone = pts[4] === '1'; memo = pts.slice(5).join(','); }
                            nA.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], incomingAmount: incAmt, isIncomingDone: isIncDone, memo: memo });
                        }
                        else if (mode === '【手元現金】' && pts.length >= 3) {
                            nW.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], outgoAmount: pts[3] || '', isOutgoDone: pts[4] === '1', isOutgoFixed: pts[5] === '1', memo: pts.slice(6).join(',') });
                        }
                        else if (mode === '【入金】' && pts.length >= 3) {
                            let isFixed = false; let isDone = false; let memo = '';
                            if (pts.length === 4) { memo = pts[3]; } else if (pts.length === 5) { isFixed = pts[3] === '1'; memo = pts[4]; } else if (pts.length >= 6) { isFixed = pts[3] === '1'; isDone = pts[4] === '1'; memo = pts.slice(5).join(','); }
                            nI.push({ id: Number(pts[0]), name: pts[1], amount: pts[2], isFixed: isFixed, isDone: isDone, memo: memo });
                        }
                        else if (mode === '【支払い】') {
                            if (line.startsWith('>') && currP && pts.length >= 4) {
                                let cat = 'variable'; let endDate = ''; let memo = '';
                                if (pts.length === 6) { cat = (pts[3] === '1' || pts[3] === '0') ? (pts[3]==='1'?'fixed':'variable') : pts[3]; endDate = pts[4]; memo = pts[5]; } 
                                else if (pts.length >= 7) { cat = (pts[3] === '1' || pts[3] === '0') ? (pts[3]==='1'?'fixed':'variable') : pts[3]; endDate = pts[4]; memo = pts.slice(5).join(','); }
                                currP.subItems.push({ id: Number(pts[0].substring(1)), name: pts[1], amount: pts[2], category: cat, endDate: endDate, memo: memo });
                            }
                            else if (pts.length >= 3) {
                                let dueDate = pts[3] ? Number(pts[3]) : null; let accountId = pts[4] ? Number(pts[4]) : ''; let cat = 'variable'; let isDone = false; let memo = '';
                                if (pts.length === 6) { memo = pts[5]; } else if (pts.length === 7) { cat = pts[5] === '1' ? 'fixed' : 'variable'; memo = pts[6]; } else if (pts.length >= 8) { cat = (pts[5] === '1' || pts[5] === '0') ? (pts[5]==='1'?'fixed':'variable') : pts[5]; isDone = pts[6] === '1'; memo = pts.slice(7).join(','); }
                                currP = { id: Number(pts[0]), name: pts[1], amount: pts[2], dueDate: dueDate, accountId: accountId, category: cat, isDone: isDone, memo: memo, subItems: [] };
                                nP.push(currP);
                            }
                        } else if (mode === '【履歴】' && pts.length >= 4) {
                            let catTotals = null;
                            if (pts.length >= 8) {
                                catTotals = { loan: Number(pts[4])||0, fixed: Number(pts[5])||0, variable: Number(pts[6])||0, investment: Number(pts[7])||0 };
                                if (catTotals.loan === 0 && catTotals.fixed === 0 && catTotals.variable === 0 && catTotals.investment === 0) catTotals = null;
                            }
                            nH.push({ id: pts[0], label: pts[1], payment: Number(pts[2]), balance: Number(pts[3]), catTotals });
                        }
                    }
                    App.state.confirmImportData = { accounts: nA, wallets: nW, incomes: nI, payments: nP, history: nH };
                    App.state.importMsg = { text: '', isError: false };
                    App.render();
                } catch (e) { App.state.importMsg = { text: 'データの解析に失敗しました。ファイルが正しくない可能性があります。', isError: true }; App.render(); }
            },
            executeImport: function() {
                const data = App.state.confirmImportData; if (!data) return;
                App.state.accounts = data.accounts; App.state.wallets = data.wallets; App.state.incomes = data.incomes; App.state.payments = data.payments; App.state.history = data.history;
                App.state.importData = ''; App.state.confirmImportData = null; App.state.showSuccessModal = true;
                App.saveData(); App.render();
            },

                    const rawMax = Math.max(...App.state.history.map(h => Math.max(Number(h.payment) || 0, Number(h.balance) || 0)), 1);
                    const maxVal = App.getNiceMax(rawMax);
                    const yAxisValues = [1, 0.75, 0.5, 0.25, 0].map(ratio => maxVal * ratio);
                    
                    html += `<div class="relative h-[380px] mt-6 flex">`;
                    
                    // Y軸目盛り（綺麗な数字）
                    html += `
                        <div class="w-16 shrink-0 flex flex-col justify-between items-end pr-2 pb-8 pt-20 text-[10px] text-gray-400 font-mono z-10 bg-white border-r border-gray-100">
                            ${yAxisValues.map(val => `<span>${val === 0 ? '0' : App.formatCurrency(val).replace('￥', '¥').replace('.00', '')}</span>`).join('')}
                        </div>
                    `;

                    // グラフエリア
                    html += `
                        <div class="flex-1 overflow-x-auto hide-scrollbar relative border-b-2 border-gray-200 pb-8">
                            <!-- 背景の点線ガイド -->
                            <div class="absolute inset-0 flex flex-col justify-between pointer-events-none z-0 pb-8 pt-20 px-2 min-w-full">
                                ${[1, 2, 3, 4, 5].map(() => `<div class="w-full border-t border-gray-200 border-dashed"></div>`).join('')}
                            </div>
                            
                            <div class="flex items-end justify-around gap-6 h-full px-4 min-w-max relative z-10 pt-20">
                    `;
                    
                    App.state.history.forEach(data => {
                        const paymentValue = Number(data.payment) || 0;
                        const balanceValue = Number(data.balance) || 0;
                        const paymentHeight = (paymentValue / maxVal) * 100;
                        const isShort = balanceValue < 0;
                        
                        // カテゴリ別積み上げ棒
                        let barsHTML = '';
                        if (data.catTotals && paymentValue > 0) {
                            const c = data.catTotals;
                            const totalCat = (c.loan||0) + (c.fixed||0) + (c.variable||0) + (c.investment||0);
                            
                            if (totalCat === 0) {
                                barsHTML = `<div class="w-full h-full bg-rose-400 rounded-t-sm"></div>`;
                            } else {
                                const pLoan = ((c.loan||0) / totalCat) * 100;
                                const pFixed = ((c.fixed||0) / totalCat) * 100;
                                const pVar = ((c.variable||0) / totalCat) * 100;
                                const pInv = ((c.investment||0) / totalCat) * 100;
                                
                                barsHTML += pInv > 0 ? `<div style="height: ${pInv}%;" class="bg-emerald-400 w-full"></div>` : '';
                                barsHTML += pVar > 0 ? `<div style="height: ${pVar}%;" class="bg-rose-400 w-full"></div>` : '';
                                barsHTML += pFixed > 0 ? `<div style="height: ${pFixed}%;" class="bg-indigo-400 w-full"></div>` : '';
                                barsHTML += pLoan > 0 ? `<div style="height: ${pLoan}%;" class="bg-purple-400 w-full"></div>` : '';
                            }
                        } else {
                            barsHTML = `<div class="w-full h-full bg-rose-400 rounded-t-sm"></div>`;
                        }

                        // ツールチップ詳細
                        let tooltipHTML = `<p class="border-b border-gray-600 pb-1 mb-1">発生総支払: ${App.formatCurrency(paymentValue)}</p>`;
                        if (data.catTotals) {
                            tooltipHTML += `<div class="text-[10px] text-gray-300 space-y-0.5">`;
                            if (data.catTotals.loan) tooltipHTML += `<p class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-400 rounded-full"></span>ローン: ${App.formatCurrency(data.catTotals.loan)}</p>`;
                            if (data.catTotals.fixed) tooltipHTML += `<p class="flex items-center gap-1"><span class="w-2 h-2 bg-indigo-400 rounded-full"></span>固定費: ${App.formatCurrency(data.catTotals.fixed)}</p>`;
                            if (data.catTotals.variable) tooltipHTML += `<p class="flex items-center gap-1"><span class="w-2 h-2 bg-rose-400 rounded-full"></span>変動費: ${App.formatCurrency(data.catTotals.variable)}</p>`;
                            if (data.catTotals.investment) tooltipHTML += `<p class="flex items-center gap-1"><span class="w-2 h-2 bg-emerald-400 rounded-full"></span>投資: ${App.formatCurrency(data.catTotals.investment)}</p>`;
                            tooltipHTML += `</div>`;
                        }
                        tooltipHTML += `<p class="mt-1.5 pt-1 border-t border-gray-600 font-bold text-emerald-300">月末残高: ${App.formatCurrency(balanceValue)}</p>`;

                        html += `
                                <div class="flex flex-col items-center group w-10 shrink-0 h-full relative" tabindex="0">
                                    <div class="opacity-0 group-focus:opacity-100 md:group-hover:opacity-100 transition-opacity absolute bottom-full mb-2 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-xs p-3 rounded-xl pointer-events-none z-50 whitespace-nowrap shadow-xl">
                                        <div class="absolute -bottom-1.5 left-1/2 transform -translate-x-1/2 w-3 h-3 bg-gray-800 rotate-45"></div>
                                        <div class="relative z-10">${tooltipHTML}</div>
                                    </div>
                                    <div class="w-full h-full flex justify-center items-end relative">
                                        <div class="w-full max-w-[32px] flex flex-col justify-end transition-all duration-500 rounded-t-sm overflow-hidden z-10" style="height: ${paymentHeight}%;">
                                            ${barsHTML}
                                        </div>
                                        <!-- 月末残高の横線マーカー -->
                                        <div class="absolute w-[160%] h-1 z-30 ${isShort ? 'bg-red-500' : 'bg-emerald-500'} rounded-full shadow-sm" style="bottom: ${Math.max(Math.min((balanceValue / maxVal) * 100, 100), -1)}%;"></div>
                                    </div>
                                    <span class="text-xs text-gray-500 mt-2 font-bold whitespace-nowrap absolute -bottom-6">${escapeHTML(data.label)}</span>
                                </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    </div>
                    `;
                }
                
                html += `
                            <div class="flex justify-center gap-4 mt-6 text-[10px] sm:text-xs text-gray-600 flex-wrap">
                                <span class="flex items-center gap-1"><div class="w-3 h-3 bg-purple-400 rounded-sm"></div>ローン</span>
                                <span class="flex items-center gap-1"><div class="w-3 h-3 bg-indigo-400 rounded-sm"></div>固定費</span>
                                <span class="flex items-center gap-1"><div class="w-3 h-3 bg-rose-400 rounded-sm"></div>変動費</span>
                                <span class="flex items-center gap-1"><div class="w-3 h-3 bg-emerald-400 rounded-sm"></div>投資</span>
                                <span class="flex items-center gap-1 ml-4"><div class="w-4 h-1.5 bg-emerald-500 rounded-full"></div>月末残高（黒字）</span>
                                <span class="flex items-center gap-1"><div class="w-4 h-1.5 bg-red-500 rounded-full"></div>月末残高（赤字）</span>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-2xl p-6 shadow-md border border-gray-100">
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">${App.getIconHTML('pencil', 20, 'text-gray-500')} 履歴データの編集・修正（手入力）</h3>
                `;
                if (App.state.history.length > 0) {
                    html += `
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left text-gray-500">
                                <thead class="text-xs text-gray-700 uppercase bg-gray-50"><tr><th class="px-4 py-3">対象月</th><th class="px-4 py-3">支払い合計額</th><th class="px-4 py-3">月末残高</th><th class="px-4 py-3 text-right">操作</th></tr></thead>
                                <tbody>
                    `;
                    App.state.history.forEach(h => {
                        if (App.state.historyEditMode === h.id) {
                            html += `
                                <tr class="bg-indigo-50 border-b">
                                    <td class="px-4 py-3 font-bold text-gray-900">${escapeHTML(h.label)}</td>
                                    <td class="px-4 py-3"><input type="number" id="edit-hist-${h.id}-payment" value="${h.payment}" class="w-full px-2 py-1 border rounded bg-white text-sm" /></td>
                                    <td class="px-4 py-3"><input type="number" id="edit-hist-${h.id}-balance" value="${h.balance}" class="w-full px-2 py-1 border rounded bg-white text-sm" /></td>
                                    <td class="px-4 py-3 text-right space-x-1 whitespace-nowrap"><button onclick="App.cancelHistoryEdit()" class="px-2.5 py-1 text-xs font-bold bg-white text-gray-600 rounded border hover:bg-gray-50">消去</button><button onclick="App.saveHistoryEdit('${h.id}')" class="px-2.5 py-1 text-xs font-bold bg-indigo-600 text-white rounded hover:bg-indigo-700">保存</button></td>
                                </tr>
                            `;
                        } else {
                            html += `
                                <tr class="bg-white border-b hover:bg-gray-50">
                                    <td class="px-4 py-3 font-bold text-gray-900">${escapeHTML(h.label)}</td>
                                    <td class="px-4 py-3 font-mono font-bold text-rose-600">${App.formatCurrency(h.payment)}</td>
                                    <td class="px-4 py-3 font-mono font-bold ${Number(h.balance) < 0 ? 'text-red-600' : 'text-emerald-600'}">${App.formatCurrency(h.balance)}</td>
                                    <td class="px-4 py-3 text-right space-x-1 whitespace-nowrap"><button onclick="App.startHistoryEdit('${h.id}')" class="text-gray-400 hover:text-indigo-600 p-1">${App.getIconHTML('pencil', 16)}</button><button onclick="App.handleDeleteHistory('${h.id}')" class="text-gray-400 hover:text-red-500 p-1">${App.getIconHTML('trash-2', 16)}</button></td>
                                </tr>
                            `;
                        }
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html += `<p class="text-sm text-gray-400 text-center py-4">データがありません</p>`;
                }
                html += `</div></div>`;
                return html;
            },

                                    <textarea id="import-data-text" oninput="App.state.importData=this.value" placeholder="ここにバックアップテキストを貼り付け" class="w-full h-24 p-3 text-xs font-mono bg-white border border-emerald-200 rounded-lg outline-none resize-y shadow-inner mb-4">${escapeHTML(App.state.importData)}</textarea>

                            </div>
                        </div>
                    `;
                }

                if (s.deleteTarget) {
                    html += `
                        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-zoom-in">

                                        <div>
                                            <span class="font-bold block mb-1 ${p.isDone?'line-through':''}">${escapeHTML(p.name)}</span>
                                            <div class="flex gap-2 text-[10px]">${p.dueDate ? `<span class="bg-gray-50 border px-1.5 py-0.5 rounded text-gray-500 flex items-center gap-1">${App.getIconHTML('calendar', 12)}${p.dueDate}日引落</span>` : ''}${p.isDone ? `<span class="bg-rose-100 text-rose-700 font-bold px-1.5 py-0.5 rounded">済</span>` : ''}</div>
                                        </div>
                                        ${App.getDisplayAmountHTML(p.amount, "text-gray-800")}
                                    </div>
                                `;
                            });
                            html += `</div>`;
                        } else {
                            html += `<p class="py-8 text-center text-sm text-gray-500 border border-dashed rounded-xl">引落予定はありません</p>`;
                        }
                        html += `
                                    </div>
                                    <div class="p-5 border-t bg-gray-50 rounded-b-2xl">
                                        <div class="flex justify-between text-sm font-bold mb-2"><span class="text-gray-600">未済引落合計</span><span class="text-rose-600">-${App.formatCurrency(activeOut)}</span></div>
                                        <div class="flex justify-between pt-3 border-t border-gray-200"><span class="text-sm font-bold text-gray-600">引落後予想残高</span><span class="font-black text-xl ${expected < 0 ? 'text-red-600' : 'text-emerald-600'}">${App.formatCurrency(expected)}</span></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }

                return html;
            },

            init: function() {
                App.loadData();
                const currentMonth = App.getCurrentMonthStr();
                const lastOpenedMonth = localStorage.getItem(STORAGE_KEY + 'last_opened_month');
                
                if (lastOpenedMonth && lastOpenedMonth !== currentMonth) {
                    App.calculateTotals();
                    const existingHistory = App.state.history;
                    if (!existingHistory.some(h => h.id === lastOpenedMonth)) {
                        const [y, m] = lastOpenedMonth.split('-');
                        const label = `${y.slice(2)}年${parseInt(m, 10)}月`;
                        const autoRecord = { 
                            id: lastOpenedMonth, 
                            label, 
                            payment: App.totals.totalPaymentsNum, 
                            balance: App.totals.calculatedEndBalance,
                            catTotals: App.totals.allCatTotals
                        };
                        existingHistory.push(autoRecord);
                        existingHistory.sort((a, b) => a.id.localeCompare(b.id));
                        App.state.showAutoSaveModal = true;
                    }
                    App.executeMonthlyReset();
                    App.saveData();
                }
                localStorage.setItem(STORAGE_KEY + 'last_opened_month', currentMonth);
                App.render();
            }
        };

        window.App = App;
        document.addEventListener('DOMContentLoaded', () => { App.init(); });

    </script>
</body>
</html>
